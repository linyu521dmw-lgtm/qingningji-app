<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>青柠集 App</title>
  <style>
    :root {
      --lime: #32c86d;
      --lime-dark: #15934a;
      --lime-soft: #eafff2;
      --screen: #f7faf8;
      --page: #dff8ec;
      --card: #ffffff;
      --text: #1e2e2a;
      --muted: #74847f;
      --line: #e2ece7;
      --danger: #e05a42;
      --shadow: 0 18px 42px rgba(25, 98, 58, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 50% 0, rgba(50, 200, 109, 0.2), transparent 24rem),
        var(--page);
    }

    button,
    input,
    select {
      font: inherit;
    }

    .phone-shell {
      width: min(390px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 12px;
    }

    .phone-screen {
      position: relative;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 24px);
      min-height: calc(100vh - 24px);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 34px;
      background: var(--screen);
      box-shadow: var(--shadow);
    }

    .app-header {
      padding: 24px 18px 16px;
      background:
        radial-gradient(circle at top right, rgba(165, 235, 102, 0.38), transparent 12rem),
        linear-gradient(180deg, #ffffff 0%, #f3fff7 100%);
    }

    .app-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .app-title {
      margin: 0;
      font-size: 28px;
      line-height: 1;
      letter-spacing: 0;
    }

    .app-subtitle {
      margin: 7px 0 0;
      color: var(--lime-dark);
      font-size: 13px;
      font-weight: 800;
    }

    .avatar {
      display: grid;
      flex: 0 0 auto;
      width: 42px;
      height: 42px;
      place-items: center;
      border: 3px solid white;
      border-radius: 50%;
      color: white;
      font-size: 17px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--lime), #9be65f);
      box-shadow: 0 10px 20px rgba(50, 200, 109, 0.22);
    }

    .status-pill {
      flex: 0 0 auto;
      max-width: 118px;
      padding: 0;
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-align: right;
      background: transparent;
    }

    .search-box {
      width: 100%;
      height: 44px;
      padding: 0 16px;
      border: 1px solid rgba(50, 200, 109, 0.18);
      border-radius: 999px;
      outline: none;
      color: var(--text);
      background: white;
      box-shadow: 0 8px 18px rgba(31, 45, 42, 0.05);
    }

    .search-box:focus {
      border-color: var(--lime);
      box-shadow: 0 0 0 4px rgba(50, 200, 109, 0.14);
    }

    .home-banner {
      margin-top: 14px;
      padding: 18px;
      overflow: hidden;
      border-radius: 22px;
      color: white;
      background:
        radial-gradient(circle at 88% 20%, rgba(255, 255, 255, 0.3), transparent 5rem),
        linear-gradient(135deg, var(--lime-dark), var(--lime) 58%, #9be65f);
      box-shadow: 0 14px 28px rgba(50, 200, 109, 0.22);
    }

    .banner-title {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .banner-copy {
      max-width: 240px;
      margin: 8px 0 0;
      color: rgba(255, 255, 255, 0.9);
      font-size: 13px;
      line-height: 1.55;
      font-weight: 700;
    }

    .quick-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .quick-button {
      min-height: 44px;
      border: 0;
      border-radius: 16px;
      color: var(--lime-dark);
      font-size: 14px;
      font-weight: 900;
      background: white;
      box-shadow: 0 8px 18px rgba(31, 45, 42, 0.05);
      cursor: pointer;
    }

    .category-scroller {
      display: flex;
      gap: 9px;
      overflow-x: auto;
      width: 100%;
      padding: 14px 18px 12px;
      background: var(--screen);
      scroll-padding: 18px;
      scrollbar-width: none;
    }

    .category-scroller::-webkit-scrollbar {
      display: none;
    }

    .category-tab {
      flex: 0 0 auto;
      min-height: 34px;
      padding: 0 14px;
      border: 0;
      border-radius: 999px;
      color: var(--lime-dark);
      font-size: 14px;
      font-weight: 800;
      background: white;
      box-shadow: inset 0 0 0 1px rgba(50, 200, 109, 0.18);
      cursor: pointer;
    }

    .category-tab.active {
      color: white;
      background: var(--lime);
      box-shadow: 0 9px 18px rgba(50, 200, 109, 0.22);
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 4px 14px 112px;
    }

    .product-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 4px 4px 12px;
    }

    .product-section-head h2 {
      margin: 0;
      font-size: 19px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .product-card {
      display: flex;
      flex-direction: column;
      min-height: 174px;
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 20px;
      color: inherit;
      text-align: left;
      background: var(--card);
      box-shadow: 0 8px 20px rgba(31, 45, 42, 0.06);
      cursor: pointer;
    }

    .product-card:active {
      transform: scale(0.99);
    }

    .product-category {
      align-self: flex-start;
      max-width: 100%;
      padding: 5px 8px;
      border-radius: 999px;
      color: var(--lime-dark);
      font-size: 12px;
      font-weight: 800;
      background: var(--lime-soft);
    }

    .product-name {
      margin: 12px 0 7px;
      font-size: 16px;
      line-height: 1.35;
      word-break: break-word;
    }

    .product-price {
      margin: 0 0 10px;
      color: var(--lime-dark);
      font-size: 21px;
      font-weight: 900;
    }

    .product-meta {
      display: grid;
      gap: 6px;
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .product-meta div {
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .product-meta span:last-child {
      min-width: 0;
      color: var(--text);
      font-weight: 700;
      text-align: right;
      word-break: break-word;
    }

    .delete-button {
      min-height: 32px;
      padding: 0 12px;
      border: 0;
      border-radius: 999px;
      color: var(--danger);
      font-size: 13px;
      font-weight: 800;
      background: #fff1ed;
      cursor: pointer;
    }

    .detail-delete-button {
      flex: 0 0 auto;
      color: var(--danger);
      background: #fff1ed;
    }

    .delete-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      grid-column: 1 / -1;
      padding: 28px 16px;
      border: 1px dashed rgba(50, 200, 109, 0.34);
      border-radius: 20px;
      color: var(--muted);
      line-height: 1.65;
      text-align: center;
      background: rgba(255, 255, 255, 0.72);
    }

    .bottom-nav {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      align-items: end;
      min-height: 72px;
      padding: 8px 10px 10px;
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(12px);
    }

    .nav-button {
      display: grid;
      place-items: center;
      gap: 3px;
      border: 0;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      background: transparent;
      cursor: pointer;
    }

    .nav-button.active {
      color: var(--lime-dark);
    }

    .nav-icon {
      display: grid;
      width: 24px;
      height: 24px;
      place-items: center;
      border-radius: 10px;
      font-size: 15px;
    }

    .publish-nav {
      align-self: center;
      gap: 4px;
      color: var(--lime-dark);
    }

    .publish-plus {
      display: grid;
      width: 54px;
      height: 54px;
      place-items: center;
      border-radius: 50%;
      color: white;
      font-size: 32px;
      font-weight: 600;
      line-height: 1;
      background: var(--lime);
      box-shadow: 0 12px 24px rgba(50, 200, 109, 0.34);
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 14px;
      background: rgba(18, 39, 31, 0.36);
      backdrop-filter: blur(7px);
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: 100%;
      overflow: hidden;
      border: 1px solid rgba(50, 200, 109, 0.16);
      border-radius: 26px;
      background: white;
      box-shadow: 0 18px 44px rgba(31, 45, 42, 0.2);
    }

    .modal-header {
      padding: 20px 20px 14px;
      background:
        radial-gradient(circle at top right, rgba(165, 235, 102, 0.3), transparent 13rem),
        var(--lime-soft);
    }

    .modal-label {
      display: inline-flex;
      margin-bottom: 9px;
      padding: 5px 9px;
      border-radius: 999px;
      color: var(--lime-dark);
      font-size: 12px;
      font-weight: 900;
      background: white;
    }

    .modal-title {
      margin: 0;
      font-size: 22px;
      line-height: 1.35;
      word-break: break-word;
    }

    .modal-price {
      margin: 7px 0 0;
      color: var(--lime-dark);
      font-size: 28px;
      font-weight: 900;
    }

    .modal-body {
      padding: 18px 20px 4px;
    }

    .detail-list {
      display: grid;
      gap: 10px;
      margin: 0;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      padding-bottom: 11px;
      border-bottom: 1px solid #edf2ef;
    }

    .detail-row dt {
      color: var(--muted);
    }

    .detail-row dd {
      margin: 0;
      font-weight: 800;
      text-align: right;
      word-break: break-word;
    }

    .modal-error {
      margin: 0;
      padding: 18px;
      border: 1px dashed rgba(50, 200, 109, 0.34);
      border-radius: 18px;
      color: var(--muted);
      line-height: 1.6;
      text-align: center;
      background: rgba(234, 255, 242, 0.72);
    }

    .form-grid {
      display: grid;
      gap: 12px;
      padding: 18px 20px 0;
    }

    .form-field {
      display: grid;
      gap: 7px;
    }

    .form-field label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .form-field input,
    .form-field select {
      width: 100%;
      height: 42px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: 14px;
      outline: none;
      color: var(--text);
      background: white;
    }

    .form-field input:focus,
    .form-field select:focus {
      border-color: var(--lime);
      box-shadow: 0 0 0 4px rgba(50, 200, 109, 0.13);
    }

    .form-tip {
      min-height: 18px;
      margin: 0;
      color: var(--danger);
      font-size: 13px;
      line-height: 1.4;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      padding: 16px 20px 20px;
    }

    .modal-button {
      flex: 1;
      min-height: 42px;
      border: 0;
      border-radius: 999px;
      font-weight: 900;
      cursor: pointer;
    }

    .modal-button.primary {
      color: white;
      background: var(--lime);
      box-shadow: 0 10px 20px rgba(50, 200, 109, 0.25);
    }

    .modal-button.secondary {
      color: var(--lime-dark);
      background: var(--lime-soft);
    }

    .modal-button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    @media (max-width: 430px) {
      .phone-shell {
        width: 100%;
        padding: 0;
      }

      .phone-screen {
        height: 100vh;
        min-height: 100vh;
        border: 0;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <main class="phone-shell">
    <section class="phone-screen" aria-label="青柠集手机 App 展示版">
      <header class="app-header">
        <div class="app-title-row">
          <div>
            <h1 class="app-title">青柠集</h1>
            <p class="app-subtitle">校园闲置交换平台</p>
          </div>
          <div class="avatar" aria-label="用户头像占位">柠</div>
        </div>
        <input class="search-box" id="searchInput" type="search" placeholder="搜索商品、地点或卖家" aria-label="搜索商品">
        <section class="home-banner" aria-label="毕业季闲置交换节">
          <h2 class="banner-title">毕业季闲置交换节</h2>
          <p class="banner-copy">让不用的物品继续陪伴下一位同学</p>
        </section>
        <div class="quick-actions" aria-label="快捷入口">
          <button class="quick-button" type="button" data-quick="pickup">校内自提</button>
          <button class="quick-button" type="button" data-quick="free">免费赠送</button>
        </div>
      </header>

      <nav class="category-scroller" aria-label="商品分类">
        <button class="category-tab active" type="button" data-category="全部">全部</button>
        <button class="category-tab" type="button" data-category="教材资料">教材</button>
        <button class="category-tab" type="button" data-category="数码电子">数码</button>
        <button class="category-tab" type="button" data-category="宿舍生活">生活</button>
        <button class="category-tab" type="button" data-category="运动">运动</button>
        <button class="category-tab" type="button" data-category="设计生专区">设计</button>
      </nav>

      <section class="content">
        <div class="product-section-head">
          <h2>猜你喜欢</h2>
          <span class="status-pill" id="statusText">正在加载...</span>
        </div>
        <div class="product-grid" id="productGrid" aria-live="polite"></div>
      </section>

      <nav class="bottom-nav" aria-label="底部导航">
        <button class="nav-button active" type="button">
          <span class="nav-icon">⌂</span>
          <span>首页</span>
        </button>
        <button class="nav-button" type="button">
          <span class="nav-icon">□</span>
          <span>分类</span>
        </button>
        <button class="nav-button publish-nav" id="openPublishButton" type="button" aria-label="发布商品">
          <span class="publish-plus">+</span>
          <span>发布</span>
        </button>
        <button class="nav-button" type="button">
          <span class="nav-icon">○</span>
          <span>消息</span>
        </button>
        <button class="nav-button" type="button">
          <span class="nav-icon">◇</span>
          <span>我的</span>
        </button>
      </nav>

      <div class="modal-backdrop" id="detailModal" aria-hidden="true">
        <section class="modal" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
          <div class="modal-header">
            <span class="modal-label" id="detailCategory">商品详情</span>
            <h2 class="modal-title" id="detailTitle">正在加载...</h2>
            <p class="modal-price" id="detailPrice"></p>
          </div>
          <div class="modal-body" id="detailBody"></div>
          <div class="modal-actions">
            <button class="modal-button primary" id="contactSellerButton" type="button">联系卖家</button>
            <button class="modal-button detail-delete-button" id="deleteDetailButton" type="button">删除商品</button>
            <button class="modal-button secondary" id="closeDetailButton" type="button">关闭</button>
          </div>
        </section>
      </div>

      <div class="modal-backdrop" id="publishModal" aria-hidden="true">
        <section class="modal" role="dialog" aria-modal="true" aria-labelledby="publishTitle">
          <div class="modal-header">
            <span class="modal-label">发布闲置</span>
            <h2 class="modal-title" id="publishTitle">填写商品信息</h2>
          </div>
          <form id="publishForm" novalidate>
            <div class="form-grid">
              <div class="form-field">
                <label for="productTitle">商品名称</label>
                <input id="productTitle" name="title" type="text" autocomplete="off">
              </div>
              <div class="form-field">
                <label for="productPrice">价格</label>
                <input id="productPrice" name="price" type="number" min="0" step="0.01" inputmode="decimal">
              </div>
              <div class="form-field">
                <label for="productCategory">分类</label>
                <select id="productCategory" name="category">
                  <option value="">请选择分类</option>
                  <option value="教材资料">教材资料</option>
                  <option value="数码电子">数码电子</option>
                  <option value="宿舍生活">宿舍生活</option>
                  <option value="运动">运动</option>
                  <option value="设计生专区">设计生专区</option>
                  <option value="免费赠送">免费赠送</option>
                </select>
              </div>
              <div class="form-field">
                <label for="productLocation">交易地点</label>
                <input id="productLocation" name="location" type="text" autocomplete="off">
              </div>
              <div class="form-field">
                <label for="productSeller">卖家</label>
                <input id="productSeller" name="seller" type="text" autocomplete="off">
              </div>
              <p class="form-tip" id="publishTip" role="alert"></p>
            </div>
            <div class="modal-actions">
              <button class="modal-button primary" id="submitPublishButton" type="submit">确认发布</button>
              <button class="modal-button secondary" id="closePublishButton" type="button">取消</button>
            </div>
          </form>
        </section>
      </div>
    </section>
  </main>

  <script>
    const API_URL = "http://localhost:3001/api/products";
    const grid = document.getElementById("productGrid");
    const statusText = document.getElementById("statusText");
    const searchInput = document.getElementById("searchInput");
    const categoryTabs = document.querySelectorAll(".category-tab");
    const detailModal = document.getElementById("detailModal");
    const detailCategory = document.getElementById("detailCategory");
    const detailTitle = document.getElementById("detailTitle");
    const detailPrice = document.getElementById("detailPrice");
    const detailBody = document.getElementById("detailBody");
    const closeDetailButton = document.getElementById("closeDetailButton");
    const contactSellerButton = document.getElementById("contactSellerButton");
    const deleteDetailButton = document.getElementById("deleteDetailButton");
    const openPublishButton = document.getElementById("openPublishButton");
    const publishModal = document.getElementById("publishModal");
    const publishForm = document.getElementById("publishForm");
    const publishTip = document.getElementById("publishTip");
    const closePublishButton = document.getElementById("closePublishButton");
    const submitPublishButton = document.getElementById("submitPublishButton");
    const productTitleInput = document.getElementById("productTitle");
    const quickButtons = document.querySelectorAll(".quick-button");
    let allProducts = [];
    let activeCategory = "全部";
    let searchKeyword = "";
    let currentDetailId = "";

    function normalizeProducts(payload) {
      if (Array.isArray(payload)) return payload;
      if (Array.isArray(payload.products)) return payload.products;
      if (Array.isArray(payload.data)) return payload.data;
      if (payload && payload.data && Array.isArray(payload.data.products)) return payload.data.products;
      return [];
    }

    function normalizeProductDetail(payload) {
      if (payload && payload.data && !Array.isArray(payload.data)) return payload.data;
      if (payload && payload.product && !Array.isArray(payload.product)) return payload.product;
      return payload || {};
    }

    function field(product, keys, fallback) {
      for (const key of keys) {
        if (product[key] !== undefined && product[key] !== null && product[key] !== "") {
          return product[key];
        }
      }
      return fallback;
    }

    function productId(product) {
      return field(product, ["id", "_id", "productId"], "");
    }

    function productCategory(product) {
      return field(product, ["category", "type"], "其他");
    }

    function formatPrice(value) {
      if (value === "面议") return value;
      const number = Number(value);
      if (Number.isFinite(number)) return `￥${number.toFixed(number % 1 === 0 ? 0 : 2)}`;
      return value || "面议";
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function productSearchText(product) {
      return [
        field(product, ["title", "name", "productName"], ""),
        productCategory(product),
        field(product, ["location", "place", "campus", "address"], ""),
        field(product, ["seller", "sellerName", "user", "username", "owner"], "")
      ].join(" ").toLowerCase();
    }

    function filteredProducts() {
      const keyword = searchKeyword.trim().toLowerCase();

      return allProducts.filter((product) => {
        const matchesCategory = activeCategory === "全部" || productCategory(product) === activeCategory;
        const matchesSearch = !keyword || productSearchText(product).includes(keyword);
        return matchesCategory && matchesSearch;
      });
    }

    function renderFilteredProducts() {
      renderProducts(filteredProducts(), Boolean(searchKeyword.trim()));
    }

    function renderProducts(products, hasSearch) {
      if (!products.length) {
        grid.innerHTML = `<div class="message">${hasSearch ? "没有找到相关闲置物品" : "暂无商品，稍后再来看看。"}</div>`;
        statusText.textContent = "0 件";
        return;
      }

      grid.innerHTML = products.map((product) => {
        const id = productId(product);
        const name = field(product, ["name", "title", "productName"], "未命名商品");
        const price = field(product, ["price", "amount"], "面议");
        const category = productCategory(product);
        const location = field(product, ["location", "place", "campus", "address"], "校内");

        return `
          <article class="product-card" data-product-id="${escapeHtml(id)}" role="button" tabindex="0" aria-label="查看${escapeHtml(name)}详情">
            <span class="product-category">${escapeHtml(category)}</span>
            <h3 class="product-name">${escapeHtml(name)}</h3>
            <p class="product-price">${escapeHtml(formatPrice(price))}</p>
            <dl class="product-meta">
              <div>
                <span>地点</span>
                <span>${escapeHtml(location)}</span>
              </div>
            </dl>
          </article>
        `;
      }).join("");

      statusText.textContent = `${products.length} 件`;
    }

    function openDetailModal() {
      detailModal.classList.add("open");
      detailModal.setAttribute("aria-hidden", "false");
    }

    function closeDetailModal() {
      detailModal.classList.remove("open");
      detailModal.setAttribute("aria-hidden", "true");
    }

    function openPublishModal() {
      publishTip.textContent = "";
      publishModal.classList.add("open");
      publishModal.setAttribute("aria-hidden", "false");
      productTitleInput.focus();
    }

    function closePublishModal() {
      publishModal.classList.remove("open");
      publishModal.setAttribute("aria-hidden", "true");
    }

    function setLoadingDetail() {
      detailCategory.textContent = "商品详情";
      detailTitle.textContent = "正在加载...";
      detailPrice.textContent = "";
      detailBody.innerHTML = '<p class="modal-error">正在获取商品详情</p>';
      contactSellerButton.disabled = true;
      deleteDetailButton.disabled = true;
      openDetailModal();
    }

    function renderDetail(product, fallbackId) {
      currentDetailId = productId(product) || fallbackId || "";
      const name = field(product, ["name", "title", "productName"], "未命名商品");
      const price = field(product, ["price", "amount"], "面议");
      const category = productCategory(product);
      const location = field(product, ["location", "place", "campus", "address"], "校内");
      const seller = field(product, ["seller", "sellerName", "user", "username", "owner"], "匿名同学");

      detailCategory.textContent = category;
      detailTitle.textContent = name;
      detailPrice.textContent = formatPrice(price);
      detailBody.innerHTML = `
        <dl class="detail-list">
          <div class="detail-row">
            <dt>分类</dt>
            <dd>${escapeHtml(category)}</dd>
          </div>
          <div class="detail-row">
            <dt>交易地点</dt>
            <dd>${escapeHtml(location)}</dd>
          </div>
          <div class="detail-row">
            <dt>卖家</dt>
            <dd>${escapeHtml(seller)}</dd>
          </div>
        </dl>
      `;
      contactSellerButton.disabled = false;
      deleteDetailButton.disabled = !currentDetailId;
    }

    function renderDetailError() {
      currentDetailId = "";
      detailCategory.textContent = "商品详情";
      detailTitle.textContent = "加载失败";
      detailPrice.textContent = "";
      detailBody.innerHTML = '<p class="modal-error">商品详情加载失败，请确认后端已启动</p>';
      contactSellerButton.disabled = true;
      deleteDetailButton.disabled = true;
      openDetailModal();
    }

    async function loadProductDetail(id) {
      if (!id) {
        renderDetailError();
        return;
      }

      setLoadingDetail();

      try {
        const response = await fetch(`${API_URL}/${encodeURIComponent(id)}`);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const payload = await response.json();
        renderDetail(normalizeProductDetail(payload), id);
      } catch (error) {
        renderDetailError();
      }
    }

    async function deleteProduct(id, button) {
      if (!id) {
        alert("删除失败，请确认后端已启动");
        return;
      }

      const confirmed = confirm("确定删除这个商品吗？");
      if (!confirmed) return;

      if (button) button.disabled = true;

      try {
        const response = await fetch(`${API_URL}/${encodeURIComponent(id)}`, {
          method: "DELETE"
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        await loadProducts();
        closeDetailModal();
      } catch (error) {
        alert("删除失败，请确认后端已启动");
        if (button) button.disabled = false;
      }
    }

    async function loadProducts() {
      try {
        const response = await fetch(API_URL);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const payload = await response.json();
        allProducts = normalizeProducts(payload);
        renderFilteredProducts();
      } catch (error) {
        statusText.textContent = "加载失败";
        grid.innerHTML = '<div class="message">后端服务未启动，请先运行 localhost:3001</div>';
      }
    }

    categoryTabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        activeCategory = tab.dataset.category || "全部";
        categoryTabs.forEach((item) => {
          item.classList.toggle("active", item === tab);
        });
        renderFilteredProducts();
      });
    });

    searchInput.addEventListener("input", () => {
      searchKeyword = searchInput.value;
      renderFilteredProducts();
    });

    quickButtons.forEach((button) => {
      button.addEventListener("click", () => {
        if (button.dataset.quick === "free") {
          activeCategory = "免费赠送";
          searchKeyword = "";
          searchInput.value = "";
        } else {
          activeCategory = "全部";
          searchKeyword = "";
          searchInput.value = "";
        }

        categoryTabs.forEach((item) => {
          item.classList.toggle("active", item.dataset.category === activeCategory);
        });
        renderFilteredProducts();
      });
    });

    grid.addEventListener("click", (event) => {
      const card = event.target.closest(".product-card");
      if (!card) return;
      loadProductDetail(card.dataset.productId);
    });

    grid.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") return;
      const card = event.target.closest(".product-card");
      if (!card) return;
      event.preventDefault();
      loadProductDetail(card.dataset.productId);
    });

    openPublishButton.addEventListener("click", openPublishModal);
    deleteDetailButton.addEventListener("click", () => {
      deleteProduct(currentDetailId, deleteDetailButton);
    });
    closeDetailButton.addEventListener("click", closeDetailModal);
    closePublishButton.addEventListener("click", closePublishModal);

    detailModal.addEventListener("click", (event) => {
      if (event.target === detailModal) closeDetailModal();
    });

    publishModal.addEventListener("click", (event) => {
      if (event.target === publishModal) closePublishModal();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && detailModal.classList.contains("open")) {
        closeDetailModal();
      }
      if (event.key === "Escape" && publishModal.classList.contains("open")) {
        closePublishModal();
      }
    });

    publishForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const formData = new FormData(publishForm);
      const title = String(formData.get("title") || "").trim();
      const priceText = String(formData.get("price") || "").trim();
      const category = String(formData.get("category") || "").trim();
      const location = String(formData.get("location") || "").trim();
      const seller = String(formData.get("seller") || "").trim();

      if (!title || !priceText || !category || !location || !seller) {
        publishTip.textContent = "请填写完整商品信息";
        return;
      }

      submitPublishButton.disabled = true;
      publishTip.textContent = "";

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            title,
            price: Number(priceText),
            category,
            location,
            seller
          })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        publishForm.reset();
        closePublishModal();
        await loadProducts();
      } catch (error) {
        publishTip.textContent = "发布失败，请确认后端已启动";
      } finally {
        submitPublishButton.disabled = false;
      }
    });

    loadProducts();
  </script>
</body>
</html>
