<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>青柠集 App</title>
  <style>
    :root {
      --lime: #32c86d;
      --lime-dark: #15934a;
      --lime-soft: #eafff2;
      --screen: #f7faf8;
      --page: #dff8ec;
      --card: #ffffff;
      --text: #1e2e2a;
      --muted: #74847f;
      --line: #e2ece7;
      --danger: #e05a42;
      --shadow: 0 18px 42px rgba(25, 98, 58, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 50% 0, rgba(50, 200, 109, 0.2), transparent 24rem),
        var(--page);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    [hidden] {
      display: none !important;
    }

    .content,
    .page-view,
    .category-scroller {
      scrollbar-width: none;
    }

    .content::-webkit-scrollbar,
    .page-view::-webkit-scrollbar,
    .category-scroller::-webkit-scrollbar {
      display: none;
    }

    .phone-shell {
      width: min(390px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 12px;
    }

    .phone-screen {
      position: relative;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 24px);
      min-height: calc(100vh - 24px);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 34px;
      background: var(--screen);
      box-shadow: var(--shadow), inset 0 0 0 8px rgba(255, 255, 255, 0.2);
    }

    .app-header {
      flex: 0 0 auto;
      padding: 24px 18px 16px;
      background:
        radial-gradient(circle at top right, rgba(165, 235, 102, 0.38), transparent 12rem),
        linear-gradient(180deg, #ffffff 0%, #f3fff7 100%);
    }

    .app-view {
      display: none;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .app-view.active {
      display: flex;
      flex-direction: column;
    }

    .app-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .app-title {
      margin: 0;
      font-size: 28px;
      line-height: 1;
      letter-spacing: 0;
    }

    .app-subtitle {
      margin: 7px 0 0;
      color: var(--lime-dark);
      font-size: 13px;
      font-weight: 800;
    }

    .avatar {
      display: grid;
      flex: 0 0 auto;
      width: 42px;
      height: 42px;
      place-items: center;
      border: 3px solid white;
      border-radius: 50%;
      color: white;
      font-size: 17px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--lime), #9be65f);
      box-shadow: 0 10px 20px rgba(50, 200, 109, 0.22);
    }

    .status-pill {
      flex: 0 0 auto;
      max-width: 118px;
      padding: 0;
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-align: right;
      background: transparent;
    }

    .search-box {
      width: 100%;
      height: 44px;
      padding: 0 16px;
      border: 1px solid rgba(50, 200, 109, 0.18);
      border-radius: 999px;
      outline: none;
      color: var(--text);
      background: white;
      box-shadow: 0 8px 18px rgba(31, 45, 42, 0.05);
    }

    .search-box:focus {
      border-color: var(--lime);
      box-shadow: 0 0 0 4px rgba(50, 200, 109, 0.14);
    }

    .home-banner {
      margin-top: 14px;
      padding: 18px;
      overflow: hidden;
      border-radius: 22px;
      color: white;
      background:
        radial-gradient(circle at 88% 20%, rgba(255, 255, 255, 0.3), transparent 5rem),
        linear-gradient(135deg, var(--lime-dark), var(--lime) 58%, #9be65f);
      box-shadow: 0 14px 28px rgba(50, 200, 109, 0.22);
    }

    .banner-title {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .banner-copy {
      max-width: 240px;
      margin: 8px 0 0;
      color: rgba(255, 255, 255, 0.9);
      font-size: 13px;
      line-height: 1.55;
      font-weight: 700;
    }

    .quick-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .quick-button {
      min-height: 44px;
      border: 0;
      border-radius: 16px;
      color: var(--lime-dark);
      font-size: 14px;
      font-weight: 900;
      background: white;
      box-shadow: 0 8px 18px rgba(31, 45, 42, 0.05);
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease;
    }

    .quick-button:active,
    .category-card:active,
    .menu-item:active,
    .my-post-delete:active {
      transform: scale(0.98);
    }

    .category-scroller {
      display: flex;
      flex: 0 0 auto;
      gap: 9px;
      overflow-x: auto;
      width: 100%;
      padding: 14px 18px 12px;
      background: var(--screen);
      scroll-padding: 18px;
    }

    .category-tab {
      flex: 0 0 auto;
      min-height: 34px;
      padding: 0 14px;
      border: 0;
      border-radius: 999px;
      color: var(--lime-dark);
      font-size: 14px;
      font-weight: 800;
      background: white;
      box-shadow: inset 0 0 0 1px rgba(50, 200, 109, 0.18);
      cursor: pointer;
    }

    .category-tab.active {
      color: white;
      background: var(--lime);
      box-shadow: 0 9px 18px rgba(50, 200, 109, 0.22);
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 6px 15px 124px;
    }

    .page-view {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px 124px;
    }

    .page-title {
      margin: 0 0 16px;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .category-list {
      display: grid;
      gap: 12px;
    }

    .category-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      width: 100%;
      min-height: 72px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 20px;
      color: var(--text);
      text-align: left;
      background: white;
      box-shadow: 0 8px 20px rgba(31, 45, 42, 0.05);
      cursor: pointer;
    }

    .category-card strong {
      display: block;
      font-size: 16px;
    }

    .category-card span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .category-mark {
      display: grid;
      flex: 0 0 auto;
      width: 42px;
      height: 42px;
      place-items: center;
      border-radius: 16px;
      color: var(--lime-dark);
      font-weight: 900;
      background: var(--lime-soft);
    }

    .empty-state {
      display: grid;
      place-items: center;
      min-height: 360px;
      padding: 28px 18px;
      border: 1px dashed rgba(50, 200, 109, 0.28);
      border-radius: 24px;
      text-align: center;
      background: rgba(255, 255, 255, 0.72);
    }

    .empty-icon {
      display: grid;
      width: 76px;
      height: 76px;
      place-items: center;
      margin: 0 auto 16px;
      border-radius: 50%;
      color: var(--lime-dark);
      font-size: 34px;
      background: var(--lime-soft);
    }

    .empty-state h2 {
      margin: 0;
      font-size: 22px;
    }

    .empty-state p {
      max-width: 250px;
      margin: 10px auto 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .conversation-list {
      display: grid;
      gap: 12px;
    }

    .conversation-card {
      display: grid;
      gap: 10px;
      padding: 17px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: white;
      box-shadow: 0 8px 20px rgba(31, 45, 42, 0.06);
    }

    .conversation-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .conversation-seller {
      min-width: 0;
      margin: 0;
      font-size: 17px;
      font-weight: 900;
      line-height: 1.25;
      word-break: break-word;
    }

    .conversation-price {
      flex: 0 0 auto;
      color: var(--lime-dark);
      font-size: 17px;
      font-weight: 900;
    }

    .conversation-product {
      margin: 0;
      color: var(--text);
      font-size: 14px;
      font-weight: 900;
      line-height: 1.4;
      word-break: break-word;
    }

    .conversation-preview {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .conversation-location {
      display: inline-flex;
      align-self: start;
      max-width: 100%;
      padding: 6px 10px;
      border-radius: 999px;
      color: var(--lime-dark);
      font-size: 12px;
      font-weight: 900;
      background: var(--lime-soft);
      word-break: break-word;
    }

    .profile-card {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 26px;
      background:
        radial-gradient(circle at top right, rgba(50, 200, 109, 0.12), transparent 10rem),
        white;
      box-shadow: 0 12px 28px rgba(31, 45, 42, 0.07);
    }

    .profile-head {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 18px;
    }

    .profile-avatar {
      display: grid;
      width: 58px;
      height: 58px;
      place-items: center;
      border-radius: 50%;
      color: white;
      font-size: 22px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--lime), #9be65f);
      border: 4px solid white;
      box-shadow: 0 12px 24px rgba(50, 200, 109, 0.24);
    }

    .profile-name {
      margin: 0;
      font-size: 19px;
      line-height: 1.2;
    }

    .profile-email {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .publish-count {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 15px;
      border-radius: 18px;
      color: var(--lime-dark);
      font-size: 14px;
      font-weight: 900;
      background: var(--lime-soft);
    }

    .menu-list {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      min-height: 52px;
      padding: 0 15px;
      border: 1px solid var(--line);
      border-radius: 18px;
      color: var(--text);
      font-weight: 800;
      background: white;
      cursor: pointer;
    }

    .menu-item span:last-child {
      color: var(--muted);
    }

    .my-posts-panel {
      display: grid;
      gap: 13px;
      margin-top: 18px;
      padding-top: 2px;
    }

    .panel-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .panel-title-row h3 {
      margin: 0;
      font-size: 17px;
      line-height: 1.2;
    }

    .panel-title-row span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .my-post-list {
      display: grid;
      gap: 12px;
    }

    .my-post-card {
      display: grid;
      gap: 12px;
      padding: 15px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: #ffffff;
      box-shadow: 0 8px 18px rgba(31, 45, 42, 0.045);
    }

    .my-post-summary {
      display: grid;
      grid-template-columns: 64px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }

    .my-post-art {
      min-height: 64px;
      border-radius: 16px;
    }

    .my-post-art .product-art-icon {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      font-size: 20px;
    }

    .my-post-art .product-art-caption {
      display: none;
    }

    .my-post-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .my-post-name {
      margin: 0;
      font-size: 15.5px;
      font-weight: 900;
      line-height: 1.35;
      word-break: break-word;
    }

    .my-post-price {
      flex: 0 0 auto;
      color: var(--lime-dark);
      font-size: 17px;
      font-weight: 900;
    }

    .my-post-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .my-post-meta span {
      padding: 6px 9px;
      border-radius: 999px;
      background: var(--lime-soft);
    }

    .my-post-delete {
      justify-self: end;
      min-height: 34px;
      padding: 0 13px;
      border: 0;
      border-radius: 999px;
      color: var(--danger);
      font-size: 13px;
      font-weight: 900;
      background: #fff1ed;
      cursor: pointer;
    }

    .my-post-empty {
      padding: 18px;
      border: 1px dashed rgba(50, 200, 109, 0.28);
      border-radius: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      text-align: center;
      background: rgba(255, 255, 255, 0.7);
    }

    .demo-reset-button {
      width: 100%;
      min-height: 40px;
      margin-top: 18px;
      border: 1px solid var(--line);
      border-radius: 14px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      background: rgba(255, 255, 255, 0.62);
      cursor: pointer;
    }

    .demo-reset-button:disabled {
      cursor: not-allowed;
      opacity: 0.62;
    }

    .product-section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 4px 4px 12px;
    }

    .product-section-head h2 {
      margin: 0;
      font-size: 19px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 13px;
    }

    .product-card {
      display: flex;
      flex-direction: column;
      min-height: 254px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 22px;
      color: inherit;
      text-align: left;
      background: var(--card);
      box-shadow: 0 9px 22px rgba(31, 45, 42, 0.06);
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease;
    }

    .product-card:active {
      transform: scale(0.99);
      border-color: rgba(50, 200, 109, 0.28);
    }

    .product-art {
      position: relative;
      display: grid;
      width: 100%;
      min-height: 106px;
      place-items: center;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.78);
      border-radius: 18px;
      background:
        radial-gradient(circle at 80% 18%, rgba(255, 255, 255, 0.7), transparent 3.8rem),
        linear-gradient(135deg, #ecfff4, #d7f8e4);
    }

    .product-art::before,
    .product-art::after {
      position: absolute;
      content: "";
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.48);
    }

    .product-art::before {
      width: 82px;
      height: 82px;
      right: -24px;
      top: -24px;
    }

    .product-art::after {
      width: 54px;
      height: 54px;
      left: -18px;
      bottom: -20px;
    }

    .product-art--image {
      background: #edf2ef;
    }

    .product-art--image::before,
    .product-art--image::after {
      display: none;
    }

    .product-art-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .product-art-icon {
      position: relative;
      z-index: 1;
      display: grid;
      width: 58px;
      height: 58px;
      place-items: center;
      border-radius: 20px;
      font-size: 30px;
      background: rgba(255, 255, 255, 0.74);
      box-shadow: 0 12px 24px rgba(31, 45, 42, 0.08);
    }

    .product-art-caption {
      position: absolute;
      left: 10px;
      bottom: 9px;
      z-index: 1;
      max-width: calc(100% - 20px);
      padding: 4px 8px;
      border-radius: 999px;
      color: var(--lime-dark);
      font-size: 11px;
      font-weight: 900;
      background: rgba(255, 255, 255, 0.72);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .product-art--books {
      background:
        radial-gradient(circle at 82% 20%, rgba(255, 255, 255, 0.74), transparent 4.2rem),
        linear-gradient(135deg, #f5fff9 0%, #d8f8e4 55%, #b9efcb 100%);
    }

    .product-art--design {
      background:
        radial-gradient(circle at 16% 18%, rgba(255, 255, 255, 0.74), transparent 4rem),
        linear-gradient(135deg, #f8fff6 0%, #e5f7ff 52%, #d9f4df 100%);
    }

    .product-art--digital {
      background:
        radial-gradient(circle at 82% 22%, rgba(255, 255, 255, 0.62), transparent 4rem),
        linear-gradient(135deg, #effff7 0%, #def1f7 48%, #cbeadb 100%);
    }

    .product-art--dorm {
      background:
        radial-gradient(circle at 18% 24%, rgba(255, 255, 255, 0.74), transparent 4rem),
        linear-gradient(135deg, #ffffff 0%, #ecfbf2 45%, #d5f2df 100%);
    }

    .product-art--gift {
      background:
        radial-gradient(circle at 82% 18%, rgba(255, 255, 255, 0.78), transparent 4rem),
        linear-gradient(135deg, #f8fff7 0%, #e6faee 48%, #c4f0d5 100%);
    }

    .product-art--campus {
      background:
        radial-gradient(circle at 80% 18%, rgba(255, 255, 255, 0.7), transparent 3.8rem),
        linear-gradient(135deg, #ffffff 0%, #eafff2 58%, #d7f1e1 100%);
    }

    .product-card-body {
      display: flex;
      flex: 1;
      flex-direction: column;
      padding: 13px 4px 4px;
    }

    .product-category {
      align-self: flex-start;
      max-width: 100%;
      padding: 5px 8px;
      border-radius: 999px;
      color: var(--lime-dark);
      font-size: 12px;
      font-weight: 800;
      background: var(--lime-soft);
    }

    .product-name {
      margin: 11px 0 8px;
      font-size: 16px;
      line-height: 1.35;
      font-weight: 900;
      word-break: break-word;
    }

    .product-price {
      margin: 0 0 12px;
      color: var(--lime-dark);
      font-size: 22px;
      font-weight: 900;
    }

    .product-meta {
      display: grid;
      gap: 6px;
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .product-meta div {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding-top: 8px;
      border-top: 1px solid #edf2ef;
    }

    .product-meta span:last-child {
      min-width: 0;
      color: var(--text);
      font-weight: 700;
      text-align: right;
      word-break: break-word;
    }

    .detail-delete-button {
      flex: 0 0 auto;
      color: var(--danger);
      background: #fff1ed;
    }

    .message {
      grid-column: 1 / -1;
      padding: 28px 16px;
      border: 1px dashed rgba(50, 200, 109, 0.34);
      border-radius: 20px;
      color: var(--muted);
      line-height: 1.65;
      text-align: center;
      background: rgba(255, 255, 255, 0.72);
    }

    .bottom-nav {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      align-items: end;
      min-height: 78px;
      padding: 9px 12px 12px;
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(12px);
    }

    .nav-button {
      display: grid;
      place-items: center;
      gap: 3px;
      border: 0;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      background: transparent;
      cursor: pointer;
      transition: color 140ms ease, transform 140ms ease;
    }

    .nav-button.active {
      color: var(--lime-dark);
    }

    .nav-button.active .nav-icon {
      color: white;
      background: var(--lime);
      box-shadow: 0 8px 16px rgba(50, 200, 109, 0.24);
    }

    .nav-icon {
      display: grid;
      width: 24px;
      height: 24px;
      place-items: center;
      border-radius: 10px;
      font-size: 15px;
      transition: color 140ms ease, background 140ms ease, box-shadow 140ms ease;
    }

    .publish-nav {
      align-self: center;
      gap: 4px;
      color: var(--lime-dark);
    }

    .publish-plus {
      display: grid;
      width: 58px;
      height: 58px;
      place-items: center;
      border-radius: 50%;
      color: white;
      font-size: 34px;
      font-weight: 600;
      line-height: 1;
      background: linear-gradient(135deg, var(--lime), var(--lime-dark));
      box-shadow: 0 14px 28px rgba(50, 200, 109, 0.38);
    }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 14px;

      padding: 18px 20px 4px;

    .detail-list {

    .detail-row dd {

      font-weight: 800;

    .modal-error {

    .form-field input,

    .upload-trigger {

  </style>
</head>
<body>
  <main class="phone-shell">

  <script>
    const API_URL = "http://localhost:3001/api/products";
    const RESET_DEMO_URL = "http://localhost:3001/api/reset-demo-products";
    const grid = document.getElementById("productGrid");
    const statusText = document.getElementById("statusText");
    const searchInput = document.getElementById("searchInput");
    const categoryTabs = document.querySelectorAll(".category-tab");
    const detailModal = document.getElementById("detailModal");
    const detailVisual = document.getElementById("detailVisual");
    const detailCategory = document.getElementById("detailCategory");
    const detailTitle = document.getElementById("detailTitle");
    const detailPrice = document.getElementById("detailPrice");
    const detailBody = document.getElementById("detailBody");
    const closeDetailButton = document.getElementById("closeDetailButton");
    const contactSellerButton = document.getElementById("contactSellerButton");
    const deleteDetailButton = document.getElementById("deleteDetailButton");
    const openPublishButton = document.getElementById("openPublishButton");
    const publishModal = document.getElementById("publishModal");
    const publishForm = document.getElementById("publishForm");
    const publishTip = document.getElementById("publishTip");
    const closePublishButton = document.getElementById("closePublishButton");
    const submitPublishButton = document.getElementById("submitPublishButton");
    const productTitleInput = document.getElementById("productTitle");
    const productImageInput = document.getElementById("productImage");
    const imagePreview = document.getElementById("imagePreview");
    const imagePreviewImg = document.getElementById("imagePreviewImg");
    const quickButtons = document.querySelectorAll(".quick-button");
    const appViews = document.querySelectorAll(".app-view");
    const navButtons = document.querySelectorAll(".nav-button[data-tab]");
    const categoryList = document.getElementById("categoryList");
    const publishedCount = document.getElementById("publishedCount");
    const messageEmptyState = document.getElementById("messageEmptyState");
    const conversationList = document.getElementById("conversationList");
    const toggleMyPostsButton = document.getElementById("toggleMyPostsButton");
    const myPostsToggleMark = document.getElementById("myPostsToggleMark");
    const myPostsPanel = document.getElementById("myPostsPanel");
    const myPostsCount = document.getElementById("myPostsCount");
    const myPostsList = document.getElementById("myPostsList");
    const resetDemoButton = document.getElementById("resetDemoButton");
    const MAX_IMAGE_WIDTH = 600;
    const MAX_IMAGE_HEIGHT = 600;
    const MAX_IMAGE_SIZE = 5 * 1024 * 1024;
    const COMPRESSED_IMAGE_TYPE = "image/jpeg";
    const COMPRESSED_IMAGE_QUALITY = 0.7;
    const categoryEntries = [
      { label: "教材资料", mark: "书" },
      { label: "设计生专区", mark: "设" },
      { label: "数码电子", mark: "数" },
      { label: "宿舍生活", mark: "舍" },
      { label: "免费赠送", mark: "赠" }
    ];
    let allProducts = [];
    let activeCategory = "全部";
    let searchKeyword = "";
    let currentDetailId = "";
    let currentDetailProduct = null;
    let conversations = [];
    let myPostsVisible = false;
    let selectedImageData = "";
    let imageUploadToken = 0;
    let isImageProcessing = false;

    function normalizeProducts(payload) {
      if (Array.isArray(payload)) return payload;
      if (Array.isArray(payload.products)) return payload.products;
      if (Array.isArray(payload.data)) return payload.data;
      if (payload && payload.data && Array.isArray(payload.data.products)) return payload.data.products;
      return [];
    }

    function normalizeProductDetail(payload) {
      if (payload && payload.data && !Array.isArray(payload.data)) return payload.data;
      if (payload && payload.product && !Array.isArray(payload.product)) return payload.product;
      return payload || {};
    }

    function field(product, keys, fallback) {
      for (const key of keys) {
        if (product[key] !== undefined && product[key] !== null && product[key] !== "") {
          return product[key];
        }
      }
      return fallback;
    }

    function productId(product) {
      return field(product, ["id", "_id", "productId"], "");
    }

    function productCategory(product) {
      return field(product, ["category", "type"], "其他");
    }

    function productImageData(product) {
      return field(product, ["imageData"], "");
    }

    function categoryVisual(category) {
      const visuals = {
        教材资料: { className: "product-art--books", icon: "📚", caption: "书本 · 文具" },
        设计生专区: { className: "product-art--design", icon: "🎨", caption: "画笔 · 色卡" },
        数码电子: { className: "product-art--digital", icon: "💻", caption: "设备 · 屏幕" },
        宿舍生活: { className: "product-art--dorm", icon: "🧺", caption: "宿舍 · 生活" },
        免费赠送: { className: "product-art--gift", icon: "🎁", caption: "礼物 · 分享" }
      };
      return visuals[category] || { className: "product-art--campus", icon: "🍋", caption: "校园闲置" };
    }

    function renderProductArt(category, extraClass = "", imageData = "") {
      if (imageData) {
        const className = ["product-art", "product-art--image", extraClass].filter(Boolean).join(" ");
        return `
          <div class="${className}" aria-hidden="true">
            <img class="product-art-image" src="${escapeHtml(imageData)}" alt="">
          </div>
        `;
      }

      const visual = categoryVisual(category);
      const className = ["product-art", visual.className, extraClass].filter(Boolean).join(" ");

      return `
        <div class="${className}" aria-hidden="true">
          <span class="product-art-icon">${visual.icon}</span>
          <span class="product-art-caption">${escapeHtml(visual.caption)}</span>
        </div>
      `;
    }

    function setDetailVisual(category, imageData = "") {
      if (imageData) {
        detailVisual.className = "product-art detail-art product-art--image";
        detailVisual.innerHTML = `<img class="product-art-image" src="${escapeHtml(imageData)}" alt="">`;
        return;
      }

      const visual = categoryVisual(category);
      detailVisual.className = `product-art detail-art ${visual.className}`;
      detailVisual.innerHTML = `
        <span class="product-art-icon">${visual.icon}</span>
        <span class="product-art-caption">${escapeHtml(visual.caption)}</span>
      `;
    }

    function formatPrice(value) {
      if (value === "面议") return value;
      const number = Number(value);
      if (Number.isFinite(number)) return `￥${number.toFixed(number % 1 === 0 ? 0 : 2)}`;
      return value || "面议";
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function productSearchText(product) {
      return [
        field(product, ["title", "name", "productName"], ""),
        productCategory(product),
        field(product, ["location", "place", "campus", "address"], ""),
        field(product, ["seller", "sellerName", "user", "username", "owner"], "")
      ].join(" ").toLowerCase();
    }

    function filteredProducts() {
      const keyword = searchKeyword.trim().toLowerCase();

      return allProducts.filter((product) => {
        const matchesCategory = activeCategory === "全部" || productCategory(product) === activeCategory;
        const matchesSearch = !keyword || productSearchText(product).includes(keyword);
        return matchesCategory && matchesSearch;
      });
    }

    function renderFilteredProducts() {
      renderProducts(filteredProducts(), Boolean(searchKeyword.trim()));
    }

    function renderActiveView() {
      renderFilteredProducts();
      renderCategoryView();
      renderMessageView();
      renderProfileView();
    }

    function renderProducts(products, hasSearch) {
      if (!products.length) {
        grid.innerHTML = `<div class="message">${hasSearch ? "没有找到相关闲置物品" : "暂无商品，稍后再来看看。"}</div>`;
        statusText.textContent = "0 件";
        return;
      }

      grid.innerHTML = products.map((product) => {
        const id = productId(product);
        const name = field(product, ["name", "title", "productName"], "未命名商品");
        const price = field(product, ["price", "amount"], "面议");
        const category = productCategory(product);
        const location = field(product, ["location", "place", "campus", "address"], "校内");
        const imageData = productImageData(product);

        return `
          <article class="product-card" data-product-id="${escapeHtml(id)}" role="button" tabindex="0" aria-label="查看${escapeHtml(name)}详情">
            ${renderProductArt(category, "", imageData)}
            <div class="product-card-body">
              <span class="product-category">${escapeHtml(category)}</span>
              <h3 class="product-name">${escapeHtml(name)}</h3>
              <p class="product-price">${escapeHtml(formatPrice(price))}</p>
              <dl class="product-meta">
                <div>
                  <span>地点</span>
                  <span>${escapeHtml(location)}</span>
                </div>
              </dl>
            </div>
          </article>
        `;
      }).join("");

      statusText.textContent = `${products.length} 件`;
    }

    function countByCategory(category) {
      return allProducts.filter((product) => productCategory(product) === category).length;
    }

    function setActiveCategory(category, shouldRender = true) {
      activeCategory = category;
      categoryTabs.forEach((item) => {
        item.classList.toggle("active", item.dataset.category === activeCategory);
      });
      if (shouldRender) renderFilteredProducts();
    }

    function showTab(tab) {
      if (tab === "publish") {
        openPublishModal();
        return;
      }
      appViews.forEach((view) => {
        view.classList.toggle("active", view.dataset.view === tab);
      });
      navButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.tab === tab);
      });
      renderActiveView();
    }

    function renderCategoryView() {
      categoryList.innerHTML = categoryEntries.map((item) => {
        const count = countByCategory(item.label);
        return `
          <button class="category-card" type="button" data-category-jump="${escapeHtml(item.label)}">
            <div>
              <strong>${escapeHtml(item.label)}</strong>
              <span>${count} 件商品</span>
            </div>
            <span class="category-mark">${escapeHtml(item.mark)}</span>
          </button>
        `;
      }).join("");
    }

    function renderProfileView() {
      publishedCount.textContent = `${allProducts.length} 件`;
      myPostsPanel.hidden = !myPostsVisible;
      myPostsToggleMark.textContent = myPostsVisible ? "收起" : "展开";
      myPostsCount.textContent = `${allProducts.length} 件商品`;

      if (!allProducts.length) {
        myPostsList.innerHTML = '<div class="my-post-empty">还没有发布商品，点击底部发布按钮添加闲置物品。</div>';
        return;
      }

      myPostsList.innerHTML = allProducts.map((product) => {
        const id = productId(product);
        const name = field(product, ["name", "title", "productName"], "未命名商品");
        const price = field(product, ["price", "amount"], "面议");
        const category = productCategory(product);
        const location = field(product, ["location", "place", "campus", "address"], "校内");
        const imageData = productImageData(product);

        return `
          <article class="my-post-card">
            <div class="my-post-summary">
              ${renderProductArt(category, "my-post-art", imageData)}
              <div>
                <div class="my-post-top">
                  <h4 class="my-post-name">${escapeHtml(name)}</h4>
                  <span class="my-post-price">${escapeHtml(formatPrice(price))}</span>
                </div>
                <p class="my-post-meta">
                  <span>${escapeHtml(category)}</span>
                  <span>${escapeHtml(location)}</span>
                </p>
              </div>
            </div>
            <button class="my-post-delete" type="button" data-delete-id="${escapeHtml(id)}">删除</button>
          </article>
        `;
      }).join("");
    }

    function renderMessageView() {
      const hasConversations = conversations.length > 0;
      messageEmptyState.hidden = hasConversations;
      conversationList.hidden = !hasConversations;

      if (!hasConversations) {
        conversationList.innerHTML = "";
        return;
      }

      conversationList.innerHTML = conversations.map((conversation) => `
        <article class="conversation-card">
          <div class="conversation-top">
            <h2 class="conversation-seller">${escapeHtml(conversation.seller)}</h2>
            <span class="conversation-price">${escapeHtml(conversation.price)}</span>
          </div>
          <p class="conversation-product">${escapeHtml(conversation.productName)}</p>
          <p class="conversation-preview">你好，我想了解一下这个闲置物品。</p>
          <span class="conversation-location">${escapeHtml(conversation.location)}</span>
        </article>
      `).join("");
    }

    function contactCurrentSeller() {
      if (!currentDetailProduct || !currentDetailId) return;

      const product = currentDetailProduct;
      const conversation = {
        id: currentDetailId,
        seller: field(product, ["seller", "sellerName", "user", "username", "owner"], "匿名同学"),
        productName: field(product, ["name", "title", "productName"], "未命名商品"),
        price: formatPrice(field(product, ["price", "amount"], "面议")),
        location: field(product, ["location", "place", "campus", "address"], "校内")
      };
      conversations = [
        conversation,
        ...conversations.filter((item) => item.id !== currentDetailId)
      ];

      closeDetailModal();
      showTab("messages");
    }

    function openDetailModal() {
      detailModal.classList.add("open");
      detailModal.setAttribute("aria-hidden", "false");
    }

    function closeDetailModal() {
      detailModal.classList.remove("open");
      detailModal.setAttribute("aria-hidden", "true");
    }

    function openPublishModal() {
      publishTip.textContent = "";
      publishModal.classList.add("open");
      publishModal.setAttribute("aria-hidden", "false");
      productTitleInput.focus();
    }

    function closePublishModal() {
      publishModal.classList.remove("open");
      publishModal.setAttribute("aria-hidden", "true");
    }

    function resetImageUpload() {
      imageUploadToken += 1;
      isImageProcessing = false;
      selectedImageData = "";
      productImageInput.value = "";
      imagePreview.hidden = true;
      imagePreviewImg.removeAttribute("src");
    }

    function loadImageFromFile(file) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        const imageUrl = URL.createObjectURL(file);

        image.addEventListener("load", () => {
          URL.revokeObjectURL(imageUrl);
          resolve(image);
        }, { once: true });

        image.addEventListener("error", () => {
          URL.revokeObjectURL(imageUrl);
          reject(new Error("Image load failed"));
        }, { once: true });

        image.src = imageUrl;
      });
    }

    async function compressImageFile(file) {
      const image = await loadImageFromFile(file);
      if (!image.naturalWidth || !image.naturalHeight) {
        throw new Error("Invalid image size");
      }

      const scale = Math.min(
        MAX_IMAGE_WIDTH / image.naturalWidth,
        MAX_IMAGE_HEIGHT / image.naturalHeight,
        1
      );
      const width = Math.max(1, Math.round(image.naturalWidth * scale));
      const height = Math.max(1, Math.round(image.naturalHeight * scale));
      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d");

      if (!context) {
        throw new Error("Canvas is not supported");
      }

      canvas.width = width;
      canvas.height = height;
      context.drawImage(image, 0, 0, width, height);
      return canvas.toDataURL(COMPRESSED_IMAGE_TYPE, COMPRESSED_IMAGE_QUALITY);
    }

    function setLoadingDetail() {
      setDetailVisual("其他");
      detailCategory.textContent = "商品详情";
      detailTitle.textContent = "正在加载...";
      detailPrice.textContent = "";
      detailBody.innerHTML = '<p class="modal-error">正在获取商品详情</p>';
      contactSellerButton.disabled = true;
      deleteDetailButton.disabled = true;
      openDetailModal();
    }

    function renderDetail(product, fallbackId) {
      currentDetailId = productId(product) || fallbackId || "";
      currentDetailProduct = product;
      const name = field(product, ["name", "title", "productName"], "未命名商品");
      const price = field(product, ["price", "amount"], "面议");
      const category = productCategory(product);
      const location = field(product, ["location", "place", "campus", "address"], "校内");
      const seller = field(product, ["seller", "sellerName", "user", "username", "owner"], "匿名同学");
      const imageData = productImageData(product);

      setDetailVisual(category, imageData);
      detailCategory.textContent = category;
      detailTitle.textContent = name;
      detailPrice.textContent = formatPrice(price);
      detailBody.innerHTML = `
        <dl class="detail-list">
          <div class="detail-row">
            <dt>分类</dt>
            <dd>${escapeHtml(category)}</dd>
          </div>
          <div class="detail-row">
            <dt>交易地点</dt>
            <dd>${escapeHtml(location)}</dd>
          </div>
          <div class="detail-row">
            <dt>卖家</dt>
            <dd>${escapeHtml(seller)}</dd>
          </div>
        </dl>
      `;
      contactSellerButton.disabled = false;
      deleteDetailButton.disabled = !currentDetailId;
    }

    function renderDetailError() {
      currentDetailId = "";
      currentDetailProduct = null;
      setDetailVisual("其他");
      detailCategory.textContent = "商品详情";
      detailTitle.textContent = "加载失败";
      detailPrice.textContent = "";
      detailBody.innerHTML = '<p class="modal-error">商品详情加载失败，请确认后端已启动</p>';
      contactSellerButton.disabled = true;
      deleteDetailButton.disabled = true;
      openDetailModal();
    }

    async function loadProductDetail(id) {
      if (!id) {
        renderDetailError();
        return;
      }

      setLoadingDetail();

      try {
        const response = await fetch(`${API_URL}/${encodeURIComponent(id)}`);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const payload = await response.json();
        renderDetail(normalizeProductDetail(payload), id);
      } catch (error) {
        renderDetailError();
      }
    }

    async function deleteProduct(id, button) {
      if (!id) {
        alert("删除失败，请确认后端已启动");
        return;
      }

      const confirmed = confirm("确定删除这个商品吗？");
      if (!confirmed) return;

      if (button) button.disabled = true;

      try {
        const response = await fetch(`${API_URL}/${encodeURIComponent(id)}`, {
          method: "DELETE"
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        await loadProducts();
        closeDetailModal();
      } catch (error) {
        alert("删除失败，请确认后端已启动");
        if (button) button.disabled = false;
      }
    }

    async function loadProducts() {
      try {
        const response = await fetch(API_URL);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const payload = await response.json();
        allProducts = normalizeProducts(payload);
        renderActiveView();
      } catch (error) {
        statusText.textContent = "加载失败";
        grid.innerHTML = '<div class="message">后端服务未启动，请先运行 localhost:3001</div>';
        renderCategoryView();
        renderMessageView();
        renderProfileView();
      }
    }

    async function resetDemoProducts() {
      const confirmed = confirm("确定要恢复演示数据吗？当前测试商品会被清除。");
      if (!confirmed) return;

      resetDemoButton.disabled = true;

      try {
        const response = await fetch(RESET_DEMO_URL, {
          method: "POST"
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        await loadProducts();
        showTab("home");
      } catch (error) {
        alert("重置失败，请确认后端已启动");
      } finally {
        resetDemoButton.disabled = false;
      }
    }

    categoryTabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        setActiveCategory(tab.dataset.category || "全部");
      });
    });

    searchInput.addEventListener("input", () => {
      searchKeyword = searchInput.value;
      renderFilteredProducts();
    });

    quickButtons.forEach((button) => {
      button.addEventListener("click", () => {
        if (button.dataset.quick === "free") {
          searchKeyword = "";
          searchInput.value = "";
          setActiveCategory("免费赠送");
        } else {
          searchKeyword = "";
          searchInput.value = "";
          setActiveCategory("全部");
        }
      });
    });

    categoryList.addEventListener("click", (event) => {
      const card = event.target.closest(".category-card");
      if (!card) return;
      const category = card.dataset.categoryJump || "全部";
      searchKeyword = "";
      searchInput.value = "";
      setActiveCategory(category, false);
      showTab("home");
    });

    navButtons.forEach((button) => {
      button.addEventListener("click", () => {
        showTab(button.dataset.tab || "home");
      });
    });

    toggleMyPostsButton.addEventListener("click", () => {
      myPostsVisible = !myPostsVisible;
      renderProfileView();
    });

    myPostsList.addEventListener("click", (event) => {
      const deleteButton = event.target.closest(".my-post-delete");
      if (!deleteButton) return;
      deleteProduct(deleteButton.dataset.deleteId, deleteButton);
    });

    resetDemoButton.addEventListener("click", resetDemoProducts);

    grid.addEventListener("click", (event) => {
      const card = event.target.closest(".product-card");
      if (!card) return;
      loadProductDetail(card.dataset.productId);
    });

    grid.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") return;
      const card = event.target.closest(".product-card");
      if (!card) return;
      event.preventDefault();
      loadProductDetail(card.dataset.productId);
    });

    openPublishButton.addEventListener("click", openPublishModal);
    contactSellerButton.addEventListener("click", contactCurrentSeller);
    deleteDetailButton.addEventListener("click", () => {
      deleteProduct(currentDetailId, deleteDetailButton);
    });
    closeDetailButton.addEventListener("click", closeDetailModal);
    closePublishButton.addEventListener("click", closePublishModal);

    productImageInput.addEventListener("change", async () => {
      const file = productImageInput.files && productImageInput.files[0];
      resetImageUpload();

      if (!file) return;

      if (!file.type.startsWith("image/")) {
        publishTip.textContent = "请选择图片文件";
        return;
      }

      const currentUploadToken = imageUploadToken;
      const isOversized = file.size > MAX_IMAGE_SIZE;
      isImageProcessing = true;
      submitPublishButton.disabled = true;
      publishTip.textContent = isOversized ? "图片过大，已自动压缩后上传" : "正在压缩图片...";

      try {
        selectedImageData = await compressImageFile(file);
        if (currentUploadToken !== imageUploadToken) return;

        imagePreviewImg.src = selectedImageData;
        imagePreview.hidden = !selectedImageData;
        publishTip.textContent = isOversized ? "图片过大，已自动压缩后上传" : "";
      } catch (error) {
        if (currentUploadToken !== imageUploadToken) return;

        publishTip.textContent = "图片读取失败，请重新选择";
      } finally {
        if (currentUploadToken === imageUploadToken) {
          isImageProcessing = false;
          submitPublishButton.disabled = false;
        }
      }
    });

    detailModal.addEventListener("click", (event) => {
      if (event.target === detailModal) closeDetailModal();
    });

    publishModal.addEventListener("click", (event) => {
      if (event.target === publishModal) closePublishModal();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && detailModal.classList.contains("open")) {
        closeDetailModal();
      }
      if (event.key === "Escape" && publishModal.classList.contains("open")) {
        closePublishModal();
      }
    });

    publishForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const formData = new FormData(publishForm);
      const title = String(formData.get("title") || "").trim();
      const priceText = String(formData.get("price") || "").trim();
      const category = String(formData.get("category") || "").trim();
      const location = String(formData.get("location") || "").trim();
      const seller = String(formData.get("seller") || "").trim();

      if (!title || !priceText || !category || !location || !seller) {
        publishTip.textContent = "请填写完整商品信息";
        return;
      }

      if (isImageProcessing) {
        publishTip.textContent = "图片正在处理，请稍后再发布";
        return;
      }

      submitPublishButton.disabled = true;
      publishTip.textContent = "";

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            title,
            price: Number(priceText),
            category,
            location,
            seller,
            imageData: selectedImageData
          })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        publishForm.reset();
        resetImageUpload();
        closePublishModal();
        await loadProducts();
      } catch (error) {
        publishTip.textContent = "发布失败，请确认后端已启动";
      } finally {
        submitPublishButton.disabled = false;
      }
    });

    loadProducts();
  </script>
</body>
</html>
