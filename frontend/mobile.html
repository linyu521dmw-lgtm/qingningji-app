<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>青柠集 App</title>
  <style>
    :root {
      --lime: #32c86d;
      --lime-dark: #15934a;
      --lime-soft: #eafff2;
      --screen: #f7faf8;
      --page: #dff8ec;
      --card: #ffffff;
      --text: #1e2e2a;
      --muted: #74847f;
      --line: #e2ece7;
      --danger: #e05a42;
      --shadow: 0 18px 42px rgba(25, 98, 58, 0.14);
      --bottom-nav-space: 170px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 50% 0, rgba(50, 200, 109, 0.2), transparent 24rem),
        var(--page);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    [hidden] {
      display: none !important;
    }

    .content,
    .page-view,
    .category-scroller {
      scrollbar-width: none;
    }

    .content::-webkit-scrollbar,
    .page-view::-webkit-scrollbar,
    .category-scroller::-webkit-scrollbar {
      display: none;
    }

    .phone-shell {
      width: min(390px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 12px;
    }

    .phone-screen {
      position: relative;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 24px);
      min-height: calc(100vh - 24px);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 34px;
      background: var(--screen);
      box-shadow: var(--shadow), inset 0 0 0 8px rgba(255, 255, 255, 0.2);
    }

    .app-header {
      flex: 0 0 auto;
      padding: 24px 18px 16px;
      background:
        radial-gradient(circle at top right, rgba(165, 235, 102, 0.38), transparent 12rem),
        linear-gradient(180deg, #ffffff 0%, #f3fff7 100%);
    }

    .app-view {
      display: none;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    .app-view.active {
      display: flex;
      flex-direction: column;
    }

    .app-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .app-title {
      margin: 0;
      font-size: 28px;
      line-height: 1;
      letter-spacing: 0;
    }

    .app-subtitle {
      margin: 7px 0 0;
      color: var(--lime-dark);
      font-size: 13px;
      font-weight: 800;
    }

    .avatar {
      display: grid;
      flex: 0 0 auto;
      width: 42px;
      height: 42px;
      place-items: center;
      border: 3px solid white;
      border-radius: 50%;
      color: white;
      font-size: 17px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--lime), #9be65f);
      box-shadow: 0 10px 20px rgba(50, 200, 109, 0.22);
    }

    .status-pill {
      flex: 0 0 auto;
      max-width: 118px;
      padding: 0;
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-align: right;
      background: transparent;
    }

    .search-box {
      width: 100%;
      height: 44px;
      padding: 0 16px;
      border: 1px solid rgba(50, 200, 109, 0.18);
      border-radius: 999px;
      outline: none;
      color: var(--text);
      background: white;
      box-shadow: 0 8px 18px rgba(31, 45, 42, 0.05);
    }

    .search-box:focus {
      border-color: var(--lime);
      box-shadow: 0 0 0 4px rgba(50, 200, 109, 0.14);
    }

    .home-banner {
      margin-top: 14px;
      padding: 18px;
      overflow: hidden;
      border-radius: 22px;
      color: white;
      background:
        radial-gradient(circle at 88% 20%, rgba(255, 255, 255, 0.3), transparent 5rem),
        linear-gradient(135deg, var(--lime-dark), var(--lime) 58%, #9be65f);
      box-shadow: 0 14px 28px rgba(50, 200, 109, 0.22);
    }

    .banner-title {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .banner-copy {
      max-width: 240px;
      margin: 8px 0 0;
      color: rgba(255, 255, 255, 0.9);
      font-size: 13px;
      line-height: 1.55;
      font-weight: 700;
    }

    .quick-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .quick-button {
      min-height: 44px;
      border: 0;
      border-radius: 16px;
      color: var(--lime-dark);
      font-size: 14px;
      font-weight: 900;
      background: white;
      box-shadow: 0 8px 18px rgba(31, 45, 42, 0.05);
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease;
    }

    .quick-button:active,
    .category-card:active,
    .menu-item:active,
    .my-post-delete:active,
    .my-post-edit:active,
    .my-post-status-button:active,
    .favorite-button:active,
    .favorite-remove:active {
      transform: scale(0.98);
    }

    .category-scroller {
      display: flex;
      flex: 0 0 auto;
      gap: 9px;
      overflow-x: auto;
      width: 100%;
      padding: 14px 18px 12px;
      background: var(--screen);
      scroll-padding: 18px;
    }

    .category-tab {
      flex: 0 0 auto;
      min-height: 34px;
      padding: 0 14px;
      border: 0;
      border-radius: 999px;
      color: var(--lime-dark);
      font-size: 14px;
      font-weight: 800;
      background: white;
      box-shadow: inset 0 0 0 1px rgba(50, 200, 109, 0.18);
      cursor: pointer;
    }

    .category-tab.active {
      color: white;
      background: var(--lime);
      box-shadow: 0 9px 18px rgba(50, 200, 109, 0.22);
    }

    .content {
      flex: 1;
      min-height: 0;
      box-sizing: border-box;
      overflow-y: auto;
      padding: 6px 15px calc(var(--bottom-nav-space) + env(safe-area-inset-bottom));
      scroll-padding-bottom: calc(var(--bottom-nav-space) + env(safe-area-inset-bottom));
    }

    .page-view {
      flex: 1;
      min-height: 0;
      box-sizing: border-box;
      overflow-y: auto;
      padding: 24px 16px calc(var(--bottom-nav-space) + env(safe-area-inset-bottom));
      scroll-padding-bottom: calc(var(--bottom-nav-space) + env(safe-area-inset-bottom));
    }

    .page-title {
      margin: 0 0 16px;
      font-size: 27px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .category-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      padding-bottom: 12px;
    }

    .category-card {
      display: grid;
      align-content: space-between;
      gap: 14px;
      width: 100%;
      min-height: 132px;
      padding: 15px;
      border: 1px solid var(--line);
      border-radius: 20px;
      color: var(--text);
      text-align: left;
      background: white;
      box-shadow: 0 8px 20px rgba(31, 45, 42, 0.05);
      cursor: pointer;
    }

    .category-card strong {
      display: block;
      font-size: 17px;
      line-height: 1.25;
    }

    .category-card span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .category-mark {
      display: grid;
      flex: 0 0 auto;
      width: 42px;
      height: 42px;
      place-items: center;
      border-radius: 16px;
      color: var(--lime-dark);
      font-weight: 900;
      background: var(--lime-soft);
      justify-self: end;
    }

    .empty-state {
      display: grid;
      place-items: center;
      min-height: 360px;
      padding: 28px 18px;
      border: 1px dashed rgba(50, 200, 109, 0.28);
      border-radius: 24px;
      text-align: center;
      background: rgba(255, 255, 255, 0.72);
    }

    .empty-icon {
      display: grid;
      width: 76px;
      height: 76px;
      place-items: center;
      margin: 0 auto 16px;
      border-radius: 50%;
      color: var(--lime-dark);
      font-size: 34px;
      background: var(--lime-soft);
    }

    .empty-state h2 {
      margin: 0;
      font-size: 22px;
    }

    .empty-state p {
      max-width: 250px;
      margin: 10px auto 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .conversation-list {
      display: grid;
      gap: 12px;
      padding-bottom: 12px;
    }

    .conversation-card {
      display: grid;
      gap: 10px;
      width: 100%;
      padding: 17px;
      border: 1px solid var(--line);
      border-radius: 22px;
      color: var(--text);
      text-align: left;
      background: white;
      box-shadow: 0 8px 20px rgba(31, 45, 42, 0.06);
      cursor: pointer;
    }

    .conversation-card:active {
      transform: scale(0.99);
    }

    .conversation-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .conversation-main {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .conversation-seller {
      min-width: 0;
      margin: 0;
      font-size: 17px;
      font-weight: 900;
      line-height: 1.25;
      word-break: break-word;
    }

    .conversation-unread-dot {
      flex: 0 0 auto;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--lime);
      box-shadow: 0 0 0 4px rgba(50, 200, 109, 0.12);
    }

    .conversation-meta {
      display: flex;
      flex: 0 0 auto;
      align-items: center;
      gap: 8px;
    }

    .conversation-time {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .conversation-price {
      flex: 0 0 auto;
      color: var(--lime-dark);
      font-size: 16px;
      font-weight: 900;
    }

    .conversation-product-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .conversation-product {
      min-width: 0;
      margin: 0;
      color: var(--text);
      font-size: 14px;
      font-weight: 900;
      line-height: 1.4;
      word-break: break-word;
    }

    .conversation-preview {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .conversation-location {
      display: inline-flex;
      align-self: start;
      max-width: 100%;
      padding: 6px 10px;
      border-radius: 999px;
      color: var(--lime-dark);
      font-size: 12px;
      font-weight: 900;
      background: var(--lime-soft);
      word-break: break-word;
    }

    .conversation-unread-badge {
      display: inline-flex;
      align-self: start;
      padding: 5px 9px;
      border-radius: 999px;
      color: var(--lime-dark);
      font-size: 11px;
      font-weight: 900;
      background: var(--lime-soft);
    }

    .chat-detail {
      display: flex;
      flex-direction: column;
      min-height: 100%;
      padding-bottom: 0;
    }

    .chat-detail-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(50, 200, 109, 0.14);
    }

    .chat-back-button {
      display: grid;
      flex: 0 0 auto;
      width: 38px;
      height: 38px;
      place-items: center;
      border: 0;
      border-radius: 14px;
      color: var(--lime-dark);
      font-size: 20px;
      font-weight: 900;
      background: white;
      box-shadow: inset 0 0 0 1px rgba(50, 200, 109, 0.18);
      cursor: pointer;
    }

    .chat-heading {
      min-width: 0;
    }

    .chat-seller {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
      letter-spacing: 0;
      word-break: break-word;
    }

    .chat-product {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.35;
      word-break: break-word;
    }

    .chat-action-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 12px;
      padding: 10px 12px;
      border: 1px solid rgba(50, 200, 109, 0.16);
      border-radius: 18px;
      background: rgba(234, 255, 242, 0.72);
    }

    .chat-action-text {
      min-width: 0;
      color: var(--lime-dark);
      font-size: 12px;
      font-weight: 900;
      line-height: 1.35;
    }

    .chat-reserve-button {
      flex: 0 0 auto;
      min-height: 34px;
      padding: 0 13px;
      border: 0;
      border-radius: 999px;
      color: white;
      font-size: 13px;
      font-weight: 900;
      background: var(--lime);
      box-shadow: 0 8px 16px rgba(50, 200, 109, 0.2);
      cursor: pointer;
    }

    .chat-reserve-button:disabled {
      color: var(--muted);
      background: #eef4f1;
      box-shadow: none;
      cursor: not-allowed;
    }

    .chat-thread {
      display: flex;
      flex: 1;
      flex-direction: column;
      gap: 12px;
      min-height: 300px;
      padding: 16px 0;
    }

    .chat-row {
      display: flex;
      align-items: flex-end;
    }

    .chat-row.buyer {
      justify-content: flex-end;
    }

    .chat-row.seller {
      justify-content: flex-start;
    }

    .chat-row.system {
      justify-content: center;
    }

    .chat-bubble {
      max-width: 78%;
      padding: 11px 13px;
      border-radius: 18px;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.55;
      word-break: break-word;
      box-shadow: 0 8px 18px rgba(31, 45, 42, 0.05);
    }

    .chat-row.buyer .chat-bubble {
      border-bottom-right-radius: 6px;
      color: white;
      background: linear-gradient(135deg, var(--lime), var(--lime-dark));
    }

    .chat-row.seller .chat-bubble {
      border: 1px solid var(--line);
      border-bottom-left-radius: 6px;
      color: var(--text);
      background: white;
    }

    .chat-row.system .chat-bubble {
      max-width: 86%;
      border: 1px solid rgba(50, 200, 109, 0.14);
      border-radius: 999px;
      color: var(--lime-dark);
      font-size: 12px;
      background: var(--lime-soft);
      box-shadow: none;
    }

    .chat-compose {
      position: sticky;
      bottom: calc(82px + env(safe-area-inset-bottom));
      display: flex;
      gap: 9px;
      margin: auto -16px 0;
      padding: 12px 16px;
      border-top: 1px solid var(--line);
      background: rgba(247, 250, 248, 0.96);
      backdrop-filter: blur(12px);
    }

    .chat-input {
      flex: 1;
      min-width: 0;
      height: 42px;
      padding: 0 14px;
      border: 1px solid rgba(50, 200, 109, 0.18);
      border-radius: 999px;
      outline: none;
      color: var(--text);
      background: white;
    }

    .chat-input:focus {
      border-color: var(--lime);
      box-shadow: 0 0 0 4px rgba(50, 200, 109, 0.12);
    }

    .chat-send-button {
      flex: 0 0 auto;
      min-width: 70px;
      height: 42px;
      border: 0;
      border-radius: 999px;
      color: white;
      font-size: 14px;
      font-weight: 900;
      background: var(--lime);
      box-shadow: 0 10px 20px rgba(50, 200, 109, 0.22);
      cursor: pointer;
    }

    .chat-send-button:active,
    .chat-reserve-button:active,
    .chat-back-button:active {
      transform: scale(0.98);
    }

    .profile-card {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 26px;
      background:
        radial-gradient(circle at top right, rgba(50, 200, 109, 0.12), transparent 10rem),
        white;
      box-shadow: 0 12px 28px rgba(31, 45, 42, 0.07);
    }

    .profile-head {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 18px;
    }

    .profile-avatar {
      display: grid;
      width: 58px;
      height: 58px;
      place-items: center;
      border-radius: 50%;
      color: white;
      font-size: 22px;
      font-weight: 900;
      background: linear-gradient(135deg, var(--lime), #9be65f);
      border: 4px solid white;
      box-shadow: 0 12px 24px rgba(50, 200, 109, 0.24);
    }

    .profile-name {
      margin: 0;
      font-size: 19px;
      line-height: 1.2;
    }

    .profile-email {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .auth-panel {
      display: grid;
      gap: 10px;
      margin: 0 0 14px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .auth-form {
      display: grid;
      gap: 10px;
    }

    .auth-input {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      font: inherit;
      color: var(--text);
      background: #fff;
      box-sizing: border-box;
    }

    .auth-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .auth-button {
      min-height: 40px;
      border: 0;
      border-radius: 8px;
      font: inherit;
      font-weight: 800;
      color: #fff;
      background: var(--green);
      cursor: pointer;
    }

    .auth-button.secondary {
      color: var(--green);
      background: #eef8ef;
    }

    .auth-tip {
      min-height: 18px;
      margin: 0;
      color: var(--muted);
      font-size: 12px;
    }

    .publish-count {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 15px;
      border-radius: 18px;
      color: var(--lime-dark);
      font-size: 14px;
      font-weight: 900;
      background: var(--lime-soft);
    }

    .weekly-flow-card {
      margin-top: 12px;
      padding: 15px;
      border: 1px solid rgba(50, 200, 109, 0.12);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 10px 22px rgba(31, 45, 42, 0.055);
    }

    .weekly-flow-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .weekly-flow-title {
      margin: 0;
      font-size: 15px;
      line-height: 1.2;
      font-weight: 900;
    }

    .weekly-flow-badge {
      padding: 4px 8px;
      border-radius: 999px;
      color: var(--lime-dark);
      font-size: 11px;
      font-weight: 900;
      background: var(--lime-soft);
      white-space: nowrap;
    }

    .weekly-flow-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .weekly-flow-item {
      min-width: 0;
      padding: 9px 6px;
      border-radius: 15px;
      text-align: center;
      background: #f7fbf8;
    }

    .weekly-flow-value {
      display: block;
      color: var(--lime-dark);
      font-size: 18px;
      line-height: 1.1;
      font-weight: 900;
    }

    .weekly-flow-label {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 10.5px;
      font-weight: 800;
      white-space: nowrap;
    }

    .menu-list {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      min-height: 52px;
      padding: 0 15px;
      border: 1px solid var(--line);
      border-radius: 18px;
      color: var(--text);
      font-weight: 800;
      background: white;
      cursor: pointer;
    }

    .menu-item span:last-child {
      color: var(--muted);
    }

    .my-posts-panel,
    .favorites-panel,
    .transactions-panel {
      display: grid;
      gap: 13px;
      margin-top: 18px;
      padding-top: 2px;
    }

    .panel-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .panel-title-row h3 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }

    .panel-title-row span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .my-post-list,
    .favorite-list,
    .transaction-list {
      display: grid;
      gap: 12px;
      padding-bottom: 12px;
    }

    .favorite-card,
    .my-post-card {
      display: flex;
      gap: 10px;
      align-items: stretch;
      min-height: 112px;
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: #ffffff;
      box-shadow: 0 8px 18px rgba(31, 45, 42, 0.045);
    }

    .my-post-art,
    .favorite-art {
      flex: 0 0 84px;
      width: 84px;
      height: 84px;
      min-height: 84px;
      border-radius: 16px;
      overflow: hidden;
    }

    .my-post-art .product-art-icon,
    .favorite-art .product-art-icon {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      font-size: 20px;
    }

    .my-post-art .product-art-caption,

    function normalizeProducts(payload) {
      if (Array.isArray(payload)) return payload;
      if (Array.isArray(payload.products)) return payload.products;
      if (Array.isArray(payload.data)) return payload.data;
      if (payload && payload.data && Array.isArray(payload.data.products)) return payload.data.products;
      return [];
    }

    function normalizeProductDetail(payload) {
      if (payload && payload.data && !Array.isArray(payload.data)) return payload.data;
      if (payload && payload.product && !Array.isArray(payload.product)) return payload.product;
      return payload || {};
    }

    function normalizeTransactions(payload) {
      if (Array.isArray(payload)) return payload;
      if (Array.isArray(payload.data)) return payload.data;
      if (Array.isArray(payload.transactions)) return payload.transactions;
      if (payload && payload.data && Array.isArray(payload.data.transactions)) return payload.data.transactions;
      return [];
    }

    function readAuthSession() {
      try {
        const session = JSON.parse(localStorage.getItem(AUTH_STORAGE_KEY) || "null");
        if (!session || !session.accessToken || !session.user || !session.user.id) return null;
        return session;
      } catch (error) {
        return null;
      }
    }

    function writeAuthSession(session) {
      currentAuthSession = session;
      if (session) {
        localStorage.setItem(AUTH_STORAGE_KEY, JSON.stringify(session));
      } else {
        localStorage.removeItem(AUTH_STORAGE_KEY);
      }
      renderActiveView();
    }

    function currentUser() {
      return currentAuthSession && currentAuthSession.user ? currentAuthSession.user : null;
    }

    function currentAccessToken() {
      return currentAuthSession && currentAuthSession.accessToken ? currentAuthSession.accessToken : "";
    }

    function authHeaders(extraHeaders = {}) {
      const token = currentAccessToken();
      return token ? { ...extraHeaders, Authorization: `Bearer ${token}` } : extraHeaders;
    }

    function productOwnerId(product) {
      return field(product, ["ownerId", "owner_id"], "");
    }

    function isOwnProduct(product) {
      const user = currentUser();
      return Boolean(user && productOwnerId(product) && productOwnerId(product) === user.id);
    }

    function requireLogin(message = "请先登录后发布。") {
      if (currentUser() && currentAccessToken()) return true;
      alert(message);
      showTab("profile");
      return false;
    }

    function requireOwnProduct(product) {
      if (isOwnProduct(product)) return true;
      alert("只能操作自己发布的商品。");
      return false;
    }

    function authErrorMessage(error) {
      const message = error && error.message ? error.message : "";
      if (message.includes("Invalid login credentials")) return "邮箱或密码不正确";
      if (message.includes("Password should be")) return "密码长度不符合要求";
      if (message.includes("User already registered")) return "该邮箱已注册";
      return message || "账号操作失败";
    }

    function field(product, keys, fallback) {
      for (const key of keys) {
        if (product[key] !== undefined && product[key] !== null && product[key] !== "") {
          return product[key];
        }
      }
      return fallback;
    }

    function productId(product) {
      return field(product, ["id", "_id", "productId"], "");
    }

    function productCategory(product) {
      return field(product, ["category", "type"], "其他");
    }

    function productImageData(product) {
      return field(product, ["imageData"], "");
    }

    function productStatus(product) {
      const status = field(product, ["status"], DEFAULT_PRODUCT_STATUS);
      return PRODUCT_STATUSES.includes(status) ? status : DEFAULT_PRODUCT_STATUS;
    }

    function productStatusClass(status) {
      if (status === "已预定") return "product-status--reserved";
      if (status === "已出") return "product-status--sold";
      return "product-status--available";
    }

    function renderProductStatus(status) {
      return `<span class="product-status ${productStatusClass(status)}">${escapeHtml(status)}</span>`;
    }

    function readFavoriteIds() {
      try {
        const parsed = JSON.parse(localStorage.getItem(FAVORITES_STORAGE_KEY) || "[]");
        if (!Array.isArray(parsed)) return [];
        return [...new Set(parsed.map((id) => String(id)).filter(Boolean))];
      } catch (error) {
        return [];
      }
    }

    function writeFavoriteIds(ids) {
      localStorage.setItem(FAVORITES_STORAGE_KEY, JSON.stringify([...new Set(ids.map((id) => String(id)).filter(Boolean))]));
    }

    function isFavoriteProduct(id) {
      return readFavoriteIds().includes(String(id));
    }

    function favoriteProducts() {
      const validIds = new Set(allProducts.map((product) => String(productId(product))).filter(Boolean));
      const nextIds = readFavoriteIds().filter((id) => validIds.has(id));
      if (productsLoaded) writeFavoriteIds(nextIds);
      return nextIds
        .map((id) => allProducts.find((product) => String(productId(product)) === id))
        .filter(Boolean);
    }

    function updateFavoriteButtons() {
      document.querySelectorAll("[data-favorite-id]").forEach((button) => {
        const id = button.dataset.favoriteId || "";
        const active = isFavoriteProduct(id);
        const label = active ? "取消收藏" : "收藏";
        button.classList.toggle("active", active);
        button.setAttribute("aria-label", label);
        button.setAttribute("aria-pressed", String(active));
        button.textContent = button.classList.contains("detail-favorite-button")
          ? `${active ? "♥" : "♡"} ${label}`
          : active ? "♥" : "♡";
      });
    }

    function toggleFavorite(id) {
      if (!id) return;
      const favoriteIds = readFavoriteIds();
      const idText = String(id);
      const nextIds = favoriteIds.includes(idText)
        ? favoriteIds.filter((item) => item !== idText)
        : [...favoriteIds, idText];

      writeFavoriteIds(nextIds);
      updateFavoriteButtons();
      renderFavoritesView();
    }

    function categoryVisual(category) {
      const visuals = {
        教材资料: { className: "product-art--books", icon: "📚", caption: "书本 · 文具" },
        设计生专区: { className: "product-art--design", icon: "🎨", caption: "画笔 · 色卡" },
        数码电子: { className: "product-art--digital", icon: "💻", caption: "设备 · 屏幕" },
        宿舍生活: { className: "product-art--dorm", icon: "🧺", caption: "宿舍 · 生活" },
        免费赠送: { className: "product-art--gift", icon: "🎁", caption: "礼物 · 分享" }
      };
      return visuals[category] || { className: "product-art--campus", icon: "🍋", caption: "校园闲置" };
    }

    function renderProductArt(category, extraClass = "", imageData = "") {
      if (imageData) {
        const className = ["product-art", "product-art--image", extraClass].filter(Boolean).join(" ");
        return `
          <div class="${className}" aria-hidden="true">
            <img class="product-art-image" src="${escapeHtml(imageData)}" alt="">
          </div>
        `;
      }

      const visual = categoryVisual(category);
      const className = ["product-art", visual.className, extraClass].filter(Boolean).join(" ");

      return `
        <div class="${className}" aria-hidden="true">
          <span class="product-art-icon">${visual.icon}</span>
          <span class="product-art-caption">${escapeHtml(visual.caption)}</span>
        </div>
      `;
    }

    function setDetailVisual(category, imageData = "") {
      if (imageData) {
        detailVisual.className = "product-art detail-art product-art--image";
        detailVisual.innerHTML = `<img class="product-art-image" src="${escapeHtml(imageData)}" alt="">`;
        return;
      }

      const visual = categoryVisual(category);
      detailVisual.className = `product-art detail-art ${visual.className}`;
      detailVisual.innerHTML = `
        <span class="product-art-icon">${visual.icon}</span>
        <span class="product-art-caption">${escapeHtml(visual.caption)}</span>
      `;
    }

    function formatPrice(value) {
      if (value === "面议") return value;
      const number = Number(value);
      if (Number.isFinite(number)) return `￥${number.toFixed(number % 1 === 0 ? 0 : 2)}`;
      return value || "面议";
    }

    function formatTransactionTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "刚刚";

      return date.toLocaleString("zh-CN", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function formatConversationTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";

      return date.toLocaleTimeString("zh-CN", {
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      });
    }

    function transactionChangeClass(toStatus) {
      if (toStatus === "已预定") return "transaction-change--reserved";
      if (toStatus === "已出") return "transaction-change--sold";
      return "transaction-change--available";
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function productSearchText(product) {
      return [
        field(product, ["title", "name", "productName"], ""),
        productCategory(product),
        productStatus(product),
        field(product, ["location", "place", "campus", "address"], ""),
        field(product, ["seller", "sellerName", "user", "username", "owner"], "")
      ].join(" ").toLowerCase();
    }

    function filteredProducts() {
      const keyword = searchKeyword.trim().toLowerCase();

      return allProducts.filter((product) => {
        const matchesCategory = activeCategory === "全部" || productCategory(product) === activeCategory;
        const matchesSearch = !keyword || productSearchText(product).includes(keyword);
        return matchesCategory && matchesSearch;
      });
    }

    function renderFilteredProducts() {
      renderProducts(filteredProducts(), Boolean(searchKeyword.trim()));
    }

    function renderActiveView() {
      renderFilteredProducts();
      renderCategoryView();
      renderMessageView();
      renderProfileView();
    }

    function renderProducts(products, hasSearch) {
      if (!products.length) {
        grid.innerHTML = `<div class="message">${hasSearch ? "没有找到相关闲置物品" : "暂无商品，稍后再来看看。"}</div>`;
        statusText.textContent = "0 件";
        return;
      }

      grid.innerHTML = products.map((product) => {
        const id = productId(product);
        const name = field(product, ["name", "title", "productName"], "未命名商品");
        const price = field(product, ["price", "amount"], "面议");
        const category = productCategory(product);
        const location = field(product, ["location", "place", "campus", "address"], "校内");
        const seller = field(product, ["seller", "sellerName", "user", "username", "owner"], "匿名同学");
        const imageData = productImageData(product);
        const status = productStatus(product);

        return `
          <article class="product-card ${status === "已出" ? "is-sold" : ""}" data-product-id="${escapeHtml(id)}" role="button" tabindex="0" aria-label="查看${escapeHtml(name)}详情">
            ${renderProductArt(category, "", imageData)}
            <div class="product-card-body">
              <div class="product-tag-row">
                <span class="product-category">${escapeHtml(category)}</span>
                ${renderProductStatus(status)}
              </div>
              <h3 class="product-name">${escapeHtml(name)}</h3>
              <p class="product-price">${escapeHtml(formatPrice(price))}</p>
              <dl class="product-meta">
                <div>
                  <span>地点</span>
                  <span>${escapeHtml(location)}</span>
                </div>
                <div>
                  <span>卖家</span>
                  <span>${escapeHtml(seller)}</span>
                </div>
              </dl>
            </div>
            <button class="favorite-button product-favorite-button" type="button" data-favorite-id="${escapeHtml(id)}" aria-label="收藏" aria-pressed="false">♡</button>
          </article>
        `;
      }).join("");

      statusText.textContent = `${products.length} 件`;
      updateFavoriteButtons();
    }

    function countByCategory(category) {
      return allProducts.filter((product) => productCategory(product) === category).length;
    }

    function setActiveCategory(category, shouldRender = true) {
      activeCategory = category;
      categoryTabs.forEach((item) => {
        item.classList.toggle("active", item.dataset.category === activeCategory);
      });
      if (shouldRender) renderFilteredProducts();
    }

    function showTab(tab) {
      if (tab === "publish") {
        openPublishModal();
        return;
      }
      if (tab !== "messages") {
        currentConversationId = "";
      }
      appViews.forEach((view) => {
        view.classList.toggle("active", view.dataset.view === tab);
      });
      navButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.tab === tab);
      });
      renderActiveView();
    }

    function renderCategoryView() {
      categoryList.innerHTML = categoryEntries.map((item) => {
        const count = countByCategory(item.label);
        return `
          <button class="category-card" type="button" data-category-jump="${escapeHtml(item.label)}">
            <div>
              <strong>${escapeHtml(item.label)}</strong>
              <span>${count} 件商品</span>
            </div>
            <span class="category-mark">${escapeHtml(item.mark)}</span>
          </button>
        `;
      }).join("");
    }

    function renderFavoritesView() {
      favoritesPanel.hidden = !favoritesVisible;
      favoritesToggleMark.textContent = favoritesVisible ? "收起" : "展开";

      const products = favoriteProducts();
      favoritesCount.textContent = `${products.length} 件商品`;

      if (!products.length) {
        favoritesList.innerHTML = `
          <div class="favorite-empty">
            <h3>还没有收藏商品</h3>
            <p>看到喜欢的闲置物品，可以先收藏起来。</p>
          </div>
        `;
        return;
      }

      favoritesList.innerHTML = products.map((product) => {
        const id = productId(product);
        const name = field(product, ["name", "title", "productName"], "未命名商品");
        const price = field(product, ["price", "amount"], "面议");
        const category = productCategory(product);
        const location = field(product, ["location", "place", "campus", "address"], "校内");
        const imageData = productImageData(product);
        const status = productStatus(product);

        return `
          <article class="favorite-card ${status === "已出" ? "is-sold" : ""}">
            ${renderProductArt(category, "favorite-art", imageData)}
            <div class="favorite-content">
              <h4 class="favorite-name">${escapeHtml(name)}</h4>
              <p class="favorite-meta">
                <span>${escapeHtml(category)}</span>
                <span>${escapeHtml(location)}</span>
                ${renderProductStatus(status)}
              </p>
            </div>
            <div class="favorite-actions">
              <span class="favorite-price">${escapeHtml(formatPrice(price))}</span>
              <button class="favorite-remove" type="button" data-remove-favorite-id="${escapeHtml(id)}">取消收藏</button>
            </div>
          </article>
        `;
      }).join("");
    }

    function renderTransactionsView() {
      transactionsPanel.hidden = !transactionsVisible;
      transactionsToggleMark.textContent = transactionsVisible ? "收起" : "展开";
      transactionsCount.textContent = `${transactions.length} 条记录`;

      if (!transactionsVisible) return;

      if (!transactionsLoaded) {
        transactionsList.innerHTML = '<div class="transaction-empty">正在加载交易记录...</div>';
        return;
      }

      if (!transactions.length) {
        transactionsList.innerHTML = `
          <div class="transaction-empty">
            <h3>暂无交易记录</h3>
            <p>当你修改商品状态后，记录会显示在这里。</p>
          </div>
        `;
        return;
      }

      const sortedTransactions = [...transactions].sort((first, second) => {
        return new Date(second.createdAt).getTime() - new Date(first.createdAt).getTime();
      });

      transactionsList.innerHTML = sortedTransactions.map((transaction) => {
        const title = field(transaction, ["title"], "未命名商品");
        const price = field(transaction, ["price"], "面议");
        const fromStatus = field(transaction, ["fromStatus"], DEFAULT_PRODUCT_STATUS);
        const toStatus = field(transaction, ["toStatus"], DEFAULT_PRODUCT_STATUS);
        const location = field(transaction, ["location"], "校内");
        const createdAt = field(transaction, ["createdAt"], "");

        return `
          <article class="transaction-card">
            <div class="transaction-top">
              <h4 class="transaction-name">${escapeHtml(title)}</h4>
              <span class="transaction-price">${escapeHtml(formatPrice(price))}</span>
            </div>
            <span class="transaction-change ${transactionChangeClass(toStatus)}">${escapeHtml(fromStatus)} → ${escapeHtml(toStatus)}</span>
            <div class="transaction-meta">
              <span class="transaction-location">${escapeHtml(location)}</span>
              <time class="transaction-time">${escapeHtml(formatTransactionTime(createdAt))}</time>
            </div>
          </article>
        `;
      }).join("");
    }

    function updateWeeklyFlowStats() {
      const validIds = new Set(allProducts.map((product) => String(productId(product))).filter(Boolean));
      const favoriteCount = readFavoriteIds().filter((id) => validIds.has(id)).length;
      const ownProducts = allProducts.filter(isOwnProduct);

      weeklyPublishedCount.textContent = ownProducts.length;
      weeklyFavoriteCount.textContent = favoriteCount;
      weeklyAvailableCount.textContent = ownProducts.filter((product) => productStatus(product) === "在售").length;
      weeklySoldCount.textContent = ownProducts.filter((product) => productStatus(product) === "已出").length;
    }

    function renderProfileView() {
      const user = currentUser();
      const ownProducts = allProducts.filter(isOwnProduct);

      profileName.textContent = user ? "校园用户" : "未登录";
      profileEmail.textContent = user ? user.email : "登录后可以发布和管理自己的商品";
      authForm.hidden = Boolean(user);
      logoutButton.hidden = !user;
      publishedCount.textContent = `${ownProducts.length} 件`;
      updateWeeklyFlowStats();
      myPostsPanel.hidden = !myPostsVisible;
      myPostsToggleMark.textContent = myPostsVisible ? "收起" : "展开";
      myPostsCount.textContent = `${ownProducts.length} 件商品`;
      renderFavoritesView();
      renderTransactionsView();

      if (!user) {
        myPostsList.innerHTML = '<div class="my-post-empty">请先登录后查看自己的发布。</div>';
        return;
      }

      if (!ownProducts.length) {
        myPostsList.innerHTML = '<div class="my-post-empty">还没有发布商品，点击底部发布按钮添加闲置物品。</div>';
        return;
      }

      myPostsList.innerHTML = ownProducts.map((product) => {
        const id = productId(product);
        const name = field(product, ["name", "title", "productName"], "未命名商品");
        const price = field(product, ["price", "amount"], "面议");
        const category = productCategory(product);
        const location = field(product, ["location", "place", "campus", "address"], "校内");
        const imageData = productImageData(product);
        const status = productStatus(product);
        const statusButtons = PRODUCT_STATUSES
          .filter((nextStatus) => nextStatus !== status)
          .map((nextStatus) => {
            const label = nextStatus === "在售" ? "恢复在售" : `标记${nextStatus}`;
            return `<button class="my-post-status-button" type="button" data-status-id="${escapeHtml(id)}" data-next-status="${escapeHtml(nextStatus)}">${escapeHtml(label)}</button>`;
          })
          .join("");

        return `
          <article class="my-post-card ${status === "已出" ? "is-sold" : ""}">
            ${renderProductArt(category, "my-post-art", imageData)}
            <div class="my-post-info">
              <h4 class="my-post-name">${escapeHtml(name)}</h4>
              <p class="my-post-meta">
                <span>${escapeHtml(category)}</span>
                <span>${escapeHtml(location)}</span>
                ${renderProductStatus(status)}
              </p>
              <div class="my-post-status-controls">${statusButtons}</div>
            </div>
            <div class="my-post-actions">
              <span class="my-post-price">${escapeHtml(formatPrice(price))}</span>
              <button class="my-post-edit" type="button" data-edit-id="${escapeHtml(id)}">编辑</button>
              <button class="my-post-delete" type="button" data-delete-id="${escapeHtml(id)}">删除</button>
            </div>
          </article>
        `;
      }).join("");
    }

    function renderMessageView() {
      const activeConversation = conversations.find((conversation) => String(conversation.id) === String(currentConversationId));

      if (currentConversationId && activeConversation) {
        messageListView.hidden = true;
        chatDetailView.hidden = false;
        renderChatDetail(activeConversation);
        return;
      }

      currentConversationId = "";
      messageListView.hidden = false;
      chatDetailView.hidden = true;

      const hasConversations = conversations.length > 0;
      messageEmptyState.hidden = hasConversations;
      conversationList.hidden = !hasConversations;

      if (!hasConversations) {
        conversationList.innerHTML = "";
        return;
      }

      conversationList.innerHTML = conversations.map((conversation) => {
        const unread = Boolean(conversation.unread);
        return `
        <article class="conversation-card" data-conversation-id="${escapeHtml(conversation.id)}" role="button" tabindex="0" aria-label="打开与${escapeHtml(conversation.seller)}关于${escapeHtml(conversation.productName)}的聊天">
          <div class="conversation-top">
            <div class="conversation-main">
              ${unread ? '<span class="conversation-unread-dot" aria-hidden="true"></span>' : ""}
              <h2 class="conversation-seller">${escapeHtml(conversation.seller)}</h2>
            </div>
            <div class="conversation-meta">
              <time class="conversation-time">${escapeHtml(formatConversationTime(conversation.updatedAt))}</time>
              ${unread ? '<span class="conversation-unread-badge">新消息</span>' : ""}
            </div>
          </div>
          <div class="conversation-product-row">
            <p class="conversation-product">${escapeHtml(conversation.productName)}</p>
            <span class="conversation-price">${escapeHtml(conversation.price)}</span>
          </div>
          <p class="conversation-preview">${escapeHtml(conversationPreview(conversation))}</p>
          <span class="conversation-location">${escapeHtml(conversation.location)}</span>
        </article>
      `;
      }).join("");
    }

    function defaultConversationMessages() {
      const createdAt = new Date().toISOString();
      return [
        { role: "buyer", text: "你好，我想了解一下这个闲置物品。", createdAt },
        { role: "seller", text: "可以的，还在。", createdAt },
        { role: "buyer", text: "可以在哪里交易？", createdAt },
        { role: "seller", text: "可以在商品标注的地点附近。", createdAt }
      ];
    }

    function conversationMessages(conversation) {
      if (Array.isArray(conversation.messages) && conversation.messages.length) {
        return conversation.messages;
      }
      conversation.messages = defaultConversationMessages();
      return conversation.messages;
    }

    function conversationPreview(conversation) {
      const messages = conversationMessages(conversation);
      const latestMessage = messages[messages.length - 1];
      return latestMessage ? latestMessage.text : "你好，我想了解一下这个闲置物品。";
    }

    function conversationUpdatedAt(conversation) {
      const messages = conversationMessages(conversation);
      const latestMessage = messages[messages.length - 1];
      return conversation.updatedAt || (latestMessage && latestMessage.createdAt) || new Date().toISOString();
    }

    function normalizeConversation(conversation) {
      const messages = conversationMessages(conversation).map((message) => ({
        role: ["seller", "system"].includes(message.role) ? message.role : "buyer",
        text: String(message.text || ""),
        createdAt: message.createdAt || conversation.updatedAt || new Date().toISOString()
      }));

      return {
        id: String(conversation.id || ""),
        seller: String(conversation.seller || "匿名同学"),
        productName: String(conversation.productName || "未命名商品"),
        price: String(conversation.price || "面议"),
        location: String(conversation.location || "校内"),
        productStatus: PRODUCT_STATUSES.includes(conversation.productStatus) ? conversation.productStatus : DEFAULT_PRODUCT_STATUS,
        messages,
        updatedAt: conversation.updatedAt || (messages[messages.length - 1] && messages[messages.length - 1].createdAt) || new Date().toISOString(),
        unread: Boolean(conversation.unread)
      };
    }

    function readStoredConversations() {
      try {
        const raw = localStorage.getItem(CONVERSATIONS_STORAGE_KEY);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        return parsed
          .map(normalizeConversation)
          .filter((conversation) => conversation.id)
          .sort((first, second) => new Date(second.updatedAt).getTime() - new Date(first.updatedAt).getTime());
      } catch (error) {
        return [];
      }
    }

    function saveConversations() {
      try {
        localStorage.setItem(CONVERSATIONS_STORAGE_KEY, JSON.stringify(conversations));
      } catch (error) {
        return;
      }
    }

    function sortConversationsByRecent() {
      conversations = [...conversations].sort((first, second) => {
        return new Date(conversationUpdatedAt(second)).getTime() - new Date(conversationUpdatedAt(first)).getTime();
      });
    }

    function conversationProduct(conversation) {
      return allProducts.find((product) => String(productId(product)) === String(conversation.id));
    }

    function conversationProductStatus(conversation) {
      const product = conversationProduct(conversation);
      if (product) return productStatus(product);
      return PRODUCT_STATUSES.includes(conversation.productStatus) ? conversation.productStatus : DEFAULT_PRODUCT_STATUS;
    }

    function updateChatReserveAction(conversation) {
      const status = conversationProductStatus(conversation);
      conversation.productStatus = status;
      chatActionText.textContent = `当前商品状态：${status}`;

      if (status === "已预定") {
        reserveProductButton.textContent = "已预定";
        reserveProductButton.disabled = true;
        return;
      }

      if (status === "已出") {
        reserveProductButton.textContent = "已出，无法预定";
        reserveProductButton.disabled = true;
        return;
      }

      reserveProductButton.textContent = "发起预定";
      reserveProductButton.disabled = false;
    }

    function messageRoleClass(role) {
      if (role === "system") return "system";
      if (role === "seller") return "seller";
      return "buyer";
    }

    function renderChatDetail(conversation) {
      chatSellerName.textContent = conversation.seller;

      const product = currentDetailProduct;
      const now = new Date().toISOString();
      const existingConversation = conversations.find((item) => String(item.id) === String(currentDetailId));
      const conversation = existingConversation || {
        id: currentDetailId,
        messages: defaultConversationMessages(),
        updatedAt: now,

      conversation.seller = field(product, ["seller", "sellerName", "user", "username", "owner"], "匿名同学");

    function loadImageFromFile(file) {
      return new Promise((resolve, reject) => {
        const image = new Image();
        const imageUrl = URL.createObjectURL(file);

        image.addEventListener("load", () => {
          URL.revokeObjectURL(imageUrl);
          resolve(image);
        }, { once: true });

        image.addEventListener("error", () => {
          URL.revokeObjectURL(imageUrl);
          reject(new Error("Image load failed"));
        }, { once: true });

        image.src = imageUrl;
      });
    }

    async function compressImageFile(file) {
      const image = await loadImageFromFile(file);
      if (!image.naturalWidth || !image.naturalHeight) {
        throw new Error("Invalid image size");
      }

      const scale = Math.min(
        MAX_IMAGE_WIDTH / image.naturalWidth,
        MAX_IMAGE_HEIGHT / image.naturalHeight,
        1
      );
      const width = Math.max(1, Math.round(image.naturalWidth * scale));
      const height = Math.max(1, Math.round(image.naturalHeight * scale));
      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d");

      if (!context) {
        throw new Error("Canvas is not supported");
      }

      canvas.width = width;
      canvas.height = height;
      context.drawImage(image, 0, 0, width, height);
      return canvas.toDataURL(COMPRESSED_IMAGE_TYPE, COMPRESSED_IMAGE_QUALITY);
    }

    async function loginWithEmail() {
      if (!supabaseAuth) {
        authTip.textContent = "请先配置 SUPABASE_URL 和 SUPABASE_ANON_KEY";
        return;
      }

      const email = authEmailInput.value.trim();
      const password = authPasswordInput.value;

      if (!email || !password) {
        authTip.textContent = "请输入邮箱和密码";
        return;
      }

      authTip.textContent = "正在登录...";

      const { data, error } = await supabaseAuth.auth.signInWithPassword({ email, password });

      if (error || !data.session || !data.user) {
        authTip.textContent = authErrorMessage(error);
        return;
      }

      writeAuthSession({
        accessToken: data.session.access_token,
        user: {
          id: data.user.id,
          email: data.user.email || email
        }
      });
      authPasswordInput.value = "";
      authTip.textContent = "";
    }

    async function signupWithEmail() {
      if (!supabaseAuth) {
        authTip.textContent = "请先配置 SUPABASE_URL 和 SUPABASE_ANON_KEY";
        return;
      }

      const email = authEmailInput.value.trim();
      const password = authPasswordInput.value;

      if (!email || !password) {
        authTip.textContent = "请输入邮箱和密码";
        return;
      }

      authTip.textContent = "正在注册...";

      const { data, error } = await supabaseAuth.auth.signUp({ email, password });

      if (error) {
        authTip.textContent = authErrorMessage(error);
        return;
      }

      if (data.session && data.user) {
        writeAuthSession({
          accessToken: data.session.access_token,
          user: {
            id: data.user.id,
            email: data.user.email || email
          }
        });
        authPasswordInput.value = "";
        authTip.textContent = "";
        return;
      }

      authTip.textContent = "注册成功，请到邮箱确认后再登录";
    }

      const priceText = String(formData.get("price") || "").trim();
      const category = String(formData.get("category") || "").trim();
      const location = String(formData.get("location") || "").trim();
      const seller = String(formData.get("seller") || "").trim();
      const price = Number(priceText);

      if (!title) {
        editTip.textContent = "商品名称不能为空";
        return;
      }

      if (!priceText || !Number.isFinite(price)) {
        editTip.textContent = "价格必须是数字";
        return;
      }

      if (!category || !location || !seller) {
        editTip.textContent = "请填写完整商品信息";
        return;
      }

      submitEditButton.disabled = true;
      editTip.textContent = "";

      try {
        const response = await fetch(`${API_URL}/${encodeURIComponent(currentEditId)}`, {
          method: "PATCH",
          headers: authHeaders({
            "Content-Type": "application/json"
          }),
          body: JSON.stringify({
            title,
            price,
            category,
            location,
            seller
          })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        closeEditModal();
        await loadProducts();
      } catch (error) {
        editTip.textContent = "保存失败，请确认后端已启动";
      } finally {
        submitEditButton.disabled = false;
      }
    });

    publishForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      if (!currentUser() || !currentAccessToken()) {
        publishTip.textContent = "请先登录后发布。";
        showTab("profile");
        return;
      }

      const formData = new FormData(publishForm);
      const title = String(formData.get("title") || "").trim();
      const priceText = String(formData.get("price") || "").trim();
      const category = String(formData.get("category") || "").trim();
      const location = String(formData.get("location") || "").trim();
      const seller = String(formData.get("seller") || "").trim();

      if (!title || !priceText || !category || !location || !seller) {
        publishTip.textContent = "请填写完整商品信息";
        return;
      }

      if (isImageProcessing) {
        publishTip.textContent = "图片正在处理，请稍后再发布";
        return;
      }

      submitPublishButton.disabled = true;
      publishTip.textContent = "";

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: authHeaders({
            "Content-Type": "application/json"
          }),
          body: JSON.stringify({
            title,
            price: Number(priceText),
            category,
            location,
            seller,
            imageData: selectedImageData
          })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        publishForm.reset();
        resetImageUpload();
        closePublishModal();
        await loadProducts();
      } catch (error) {
        publishTip.textContent = "发布失败，请确认后端已启动";
      } finally {
        submitPublishButton.disabled = false;
      }
    });

    loadProducts();
  </script>
</body>
</html>
