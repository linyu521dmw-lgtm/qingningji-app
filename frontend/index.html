<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>青柠集</title>
  <style>
    :root {
      --lime: #31c86b;
      --lime-dark: #179b4c;
      --lime-soft: #eafff1;
      --text: #1f2d2a;
      --muted: #71817c;
      --line: #dfe8e4;
      --bg: #f5f8f6;
      --card: #ffffff;
      --shadow: 0 12px 30px rgba(35, 91, 63, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(49, 200, 107, 0.16), transparent 34rem),
        linear-gradient(180deg, #fbfffc 0%, var(--bg) 42%, #eef5f1 100%);
    }

    .page {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }

    .hero {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      padding: 28px;
      border: 1px solid rgba(49, 200, 107, 0.16);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
      font-weight: 700;
      color: var(--lime-dark);
    }

    .logo {
      display: grid;
      width: 44px;
      height: 44px;
      place-items: center;
      border-radius: 14px;
      color: white;
      font-size: 24px;
      background: linear-gradient(135deg, var(--lime), #9be65f);
      box-shadow: 0 10px 20px rgba(49, 200, 107, 0.24);
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 56px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 580px;
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.7;
    }

    .search-panel {
      width: min(420px, 100%);
      padding: 16px;
      border-radius: 20px;
      background: var(--lime-soft);
      border: 1px solid rgba(49, 200, 107, 0.14);
    }

    .search-box {
      width: 100%;
      height: 46px;
      padding: 0 16px;
      border: 1px solid rgba(23, 155, 76, 0.2);
      border-radius: 999px;
      outline: none;
      color: var(--text);
      font-size: 15px;
      background: white;
    }

    .search-box:focus {
      border-color: var(--lime);
      box-shadow: 0 0 0 4px rgba(49, 200, 107, 0.14);
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .tab {
      border: 0;
      padding: 8px 13px;
      border-radius: 999px;
      color: var(--lime-dark);
      font-weight: 700;
      background: white;
      box-shadow: inset 0 0 0 1px rgba(49, 200, 107, 0.18);
      cursor: pointer;
      transition: background 160ms ease, color 160ms ease, box-shadow 160ms ease;
    }

    .tab.active {
      color: white;
      background: var(--lime);
      box-shadow: none;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 28px 4px 16px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 22px;
    }

    .status {
      color: var(--muted);
      font-size: 14px;
    }

    .section-actions {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .publish-button {
      min-height: 42px;
      padding: 0 18px;
      border: 0;
      border-radius: 999px;
      color: white;
      font-size: 15px;
      font-weight: 800;
      background: var(--lime);
      box-shadow: 0 10px 20px rgba(49, 200, 107, 0.22);
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .publish-button:hover,
    .publish-button:focus-visible {
      background: var(--lime-dark);
      transform: translateY(-1px);
      box-shadow: 0 14px 24px rgba(49, 200, 107, 0.26);
    }

    .publish-button:focus-visible {
      outline: 3px solid rgba(49, 200, 107, 0.26);
      outline-offset: 3px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 18px;
    }

    .card {
      display: flex;
      flex-direction: column;
      min-height: 210px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--card);
      box-shadow: 0 10px 24px rgba(31, 45, 42, 0.06);
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
      cursor: pointer;
    }

    .card:hover,
    .card:focus-visible {
      transform: translateY(-3px);
      border-color: rgba(49, 200, 107, 0.34);
      box-shadow: 0 16px 32px rgba(31, 45, 42, 0.1);
    }

    .card:focus-visible {
      outline: 3px solid rgba(49, 200, 107, 0.26);
      outline-offset: 3px;
    }

    .category {
      display: inline-flex;
      max-width: 100%;
      padding: 6px 10px;
      border-radius: 999px;
      color: var(--lime-dark);
      font-size: 13px;
      font-weight: 700;
      background: var(--lime-soft);
    }

    .name {
      margin: 16px 0 8px;
      font-size: 20px;
      line-height: 1.35;
      word-break: break-word;
    }

    .price {
      margin: 0 0 18px;
      color: var(--lime-dark);
      font-size: 26px;
      font-weight: 800;
    }

    .meta {
      display: grid;
      gap: 10px;
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .meta div {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-top: 10px;
      border-top: 1px solid #edf2ef;
    }

    .meta span:last-child {
      color: var(--text);
      font-weight: 600;
      text-align: right;
    }

    .card-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: auto;
      padding-top: 18px;
    }

    .delete-button {
      min-height: 36px;
      padding: 0 14px;
      border: 0;
      border-radius: 999px;
      color: var(--lime-dark);
      font-size: 14px;
      font-weight: 800;
      background: var(--lime-soft);
      box-shadow: inset 0 0 0 1px rgba(49, 200, 107, 0.2);
      cursor: pointer;
      transition: background 160ms ease, color 160ms ease, box-shadow 160ms ease;
    }

    .delete-button:hover,
    .delete-button:focus-visible {
      color: white;
      background: var(--lime-dark);
      box-shadow: 0 8px 18px rgba(49, 200, 107, 0.2);
      outline: none;
    }

    .delete-button:disabled {
      cursor: not-allowed;
      opacity: 0.62;
    }

    .message {
      padding: 28px;
      border: 1px dashed rgba(49, 200, 107, 0.36);
      border-radius: 22px;
      color: var(--muted);
      text-align: center;
      background: rgba(255, 255, 255, 0.72);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(18, 39, 31, 0.34);
      backdrop-filter: blur(8px);
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(440px, 100%);
      overflow: hidden;
      border: 1px solid rgba(49, 200, 107, 0.2);
      border-radius: 24px;
      background: var(--card);
      box-shadow: 0 24px 60px rgba(31, 45, 42, 0.2);
    }

    .modal-header {
      padding: 24px 24px 18px;
      background:
        radial-gradient(circle at top right, rgba(155, 230, 95, 0.24), transparent 15rem),
        var(--lime-soft);
    }

    .modal-label {
      display: inline-flex;
      margin-bottom: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      color: var(--lime-dark);
      font-size: 13px;
      font-weight: 800;
      background: white;
    }

    .modal-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.35;
      word-break: break-word;
    }

    .modal-price {
      margin: 8px 0 0;
      color: var(--lime-dark);
      font-size: 30px;
      font-weight: 900;
    }

    .modal-body {
      padding: 20px 24px 8px;
    }

    .detail-list {
      display: grid;
      gap: 12px;
      margin: 0;
    }

    .detail-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 13px 0;
      border-bottom: 1px solid #edf2ef;
    }

    .detail-row dt {
      color: var(--muted);
    }

    .detail-row dd {
      margin: 0;
      color: var(--text);
      font-weight: 700;
      text-align: right;
      word-break: break-word;
    }

    .modal-error {
      margin: 0;
      padding: 18px;
      border: 1px dashed rgba(49, 200, 107, 0.34);
      border-radius: 18px;
      color: var(--muted);
      line-height: 1.6;
      text-align: center;
      background: rgba(234, 255, 241, 0.72);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      padding: 18px 24px 24px;
    }

    .modal-button {
      min-height: 42px;
      padding: 0 18px;
      border: 0;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    .modal-button.primary {
      color: white;
      background: var(--lime);
      box-shadow: 0 10px 20px rgba(49, 200, 107, 0.24);
    }

    .modal-button.secondary {
      color: var(--lime-dark);
      background: var(--lime-soft);
    }

    .publish-form {
      display: grid;
      gap: 14px;
      padding: 20px 24px 4px;
    }

    .form-field {
      display: grid;
      gap: 8px;
    }

    .form-field label {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .form-field input,
    .form-field select {
      width: 100%;
      height: 44px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      outline: none;
      color: var(--text);
      font: inherit;
      background: white;
    }

    .form-field input:focus,
    .form-field select:focus {
      border-color: var(--lime);
      box-shadow: 0 0 0 4px rgba(49, 200, 107, 0.14);
    }

    .form-tip {
      min-height: 20px;
      margin: 0;
      color: #d24b31;
      font-size: 14px;
      line-height: 1.45;
    }

    @media (max-width: 760px) {
      .page {
        width: min(100% - 24px, 1120px);
        padding-top: 18px;
      }

      .hero {
        display: block;
        padding: 22px;
        border-radius: 20px;
      }

      .search-panel {
        margin-top: 22px;
      }

      .modal {
        border-radius: 20px;
      }

      .modal-actions {
        flex-direction: column;
      }

      .modal-button {
        width: 100%;
      }

      .section-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .section-actions {
        width: 100%;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div>
        <div class="brand">
          <div class="logo">柠</div>
          <span>校园闲置交换 App</span>
        </div>
        <h1>青柠集</h1>
        <p class="subtitle">把闲置好物留在校园里流转，课本、数码、生活用品都能轻松找到下一位同学。</p>
      </div>

      <div class="search-panel">
        <input class="search-box" type="search" placeholder="搜索商品、地点或卖家" aria-label="搜索商品">
        <div class="tabs" aria-label="商品分类">
          <button class="tab active" type="button" data-category="全部">全部</button>
          <button class="tab" type="button" data-category="教材资料">教材</button>
          <button class="tab" type="button" data-category="数码电子">数码</button>
          <button class="tab" type="button" data-category="宿舍生活">生活</button>
          <button class="tab" type="button" data-category="运动">运动</button>
          <button class="tab" type="button" data-category="设计生专区">设计</button>
        </div>
      </div>
    </section>

    <div class="section-head">
      <h2>最新商品</h2>
      <div class="section-actions">
        <span class="status" id="status">正在加载...</span>
        <button class="publish-button" id="openPublishButton" type="button">发布闲置</button>
      </div>
    </div>

    <section class="grid" id="productGrid" aria-live="polite"></section>
  </main>

  <div class="modal-backdrop" id="detailModal" aria-hidden="true">
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
      <div class="modal-header">
        <span class="modal-label" id="detailCategory">商品详情</span>
        <h2 class="modal-title" id="detailTitle">正在加载...</h2>
        <p class="modal-price" id="detailPrice"></p>
      </div>
      <div class="modal-body" id="detailBody"></div>
      <div class="modal-actions">
        <button class="modal-button primary" id="contactSellerButton" type="button">联系卖家</button>
        <button class="modal-button secondary" id="closeModalButton" type="button">关闭</button>
      </div>
    </section>
  </div>

  <div class="modal-backdrop" id="publishModal" aria-hidden="true">
    <section class="modal" role="dialog" aria-modal="true" aria-labelledby="publishTitle">
      <div class="modal-header">
        <span class="modal-label">发布闲置</span>
        <h2 class="modal-title" id="publishTitle">填写商品信息</h2>
      </div>
      <form id="publishForm" novalidate>
        <div class="publish-form">
          <div class="form-field">
            <label for="productTitle">商品名称</label>
            <input id="productTitle" name="title" type="text" autocomplete="off">
          </div>
          <div class="form-field">
            <label for="productPrice">价格</label>
            <input id="productPrice" name="price" type="number" min="0" step="0.01" inputmode="decimal">
          </div>
          <div class="form-field">
            <label for="productCategory">分类</label>
            <select id="productCategory" name="category">
              <option value="">请选择分类</option>
              <option value="教材资料">教材资料</option>
              <option value="设计生专区">设计生专区</option>
              <option value="数码电子">数码电子</option>
              <option value="宿舍生活">宿舍生活</option>
              <option value="免费赠送">免费赠送</option>
            </select>
          </div>
          <div class="form-field">
            <label for="productLocation">交易地点</label>
            <input id="productLocation" name="location" type="text" autocomplete="off">
          </div>
          <div class="form-field">
            <label for="productSeller">卖家</label>
            <input id="productSeller" name="seller" type="text" autocomplete="off">
          </div>
          <p class="form-tip" id="publishTip" role="alert"></p>
        </div>
        <div class="modal-actions">
          <button class="modal-button primary" id="submitPublishButton" type="submit">确认发布</button>
          <button class="modal-button secondary" id="closePublishButton" type="button">取消</button>
        </div>
      </form>
    </section>
  </div>

  <script>
    const API_URL = "http://localhost:3001/api/products";
    const grid = document.getElementById("productGrid");
    const statusText = document.getElementById("status");
    const detailModal = document.getElementById("detailModal");
    const detailCategory = document.getElementById("detailCategory");
    const detailTitle = document.getElementById("detailTitle");
    const detailPrice = document.getElementById("detailPrice");
    const detailBody = document.getElementById("detailBody");
    const contactSellerButton = document.getElementById("contactSellerButton");
    const closeModalButton = document.getElementById("closeModalButton");
    const searchBox = document.querySelector(".search-box");
    const categoryTabs = document.querySelectorAll(".tab");
    const openPublishButton = document.getElementById("openPublishButton");
    const publishModal = document.getElementById("publishModal");
    const publishForm = document.getElementById("publishForm");
    const publishTip = document.getElementById("publishTip");
    const closePublishButton = document.getElementById("closePublishButton");
    const submitPublishButton = document.getElementById("submitPublishButton");
    const productTitleInput = document.getElementById("productTitle");
    let allProducts = [];
    let activeCategory = "全部";
    let searchKeyword = "";

    function normalizeProducts(payload) {
      if (Array.isArray(payload)) return payload;
      if (Array.isArray(payload.products)) return payload.products;
      if (Array.isArray(payload.data)) return payload.data;
      if (payload.data && Array.isArray(payload.data.products)) return payload.data.products;
      return [];
    }

    function field(product, keys, fallback) {
      for (const key of keys) {
        if (product[key] !== undefined && product[key] !== null && product[key] !== "") {
          return product[key];
        }
      }
      return fallback;
    }

    function productId(product) {
      return field(product, ["id", "_id", "productId"], "");
    }

    function normalizeProductDetail(payload) {
      if (payload && payload.data && !Array.isArray(payload.data)) return payload.data;
      if (payload && payload.product && !Array.isArray(payload.product)) return payload.product;
      return payload || {};
    }

    function formatPrice(value) {
      if (value === "面议") return value;
      const number = Number(value);
      if (Number.isFinite(number)) return `￥${number.toFixed(number % 1 === 0 ? 0 : 2)}`;
      return value || "面议";
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function openModal() {
      detailModal.classList.add("open");
      detailModal.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
      closeModalButton.focus();
    }

    function closeModal() {
      detailModal.classList.remove("open");
      detailModal.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    function openPublishModal() {
      publishTip.textContent = "";
      publishModal.classList.add("open");
      publishModal.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
      productTitleInput.focus();
    }

    function closePublishModal() {
      publishModal.classList.remove("open");
      publishModal.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    function resetFilters() {
      activeCategory = "全部";
      searchKeyword = "";
      searchBox.value = "";
      categoryTabs.forEach((item) => {
        item.classList.toggle("active", item.dataset.category === "全部");
      });
    }

    function setLoadingDetail() {
      detailCategory.textContent = "商品详情";
      detailTitle.textContent = "正在加载...";
      detailPrice.textContent = "";
      detailBody.innerHTML = '<p class="modal-error">正在获取商品详情</p>';
      contactSellerButton.disabled = true;
      openModal();
    }

    function renderDetail(product) {
      const name = field(product, ["name", "title", "productName"], "未命名商品");
      const price = field(product, ["price", "amount"], "面议");
      const category = field(product, ["category", "type"], "其他");
      const location = field(product, ["location", "place", "campus", "address"], "校内");
      const seller = field(product, ["seller", "sellerName", "user", "username", "owner"], "匿名同学");

      detailCategory.textContent = category;
      detailTitle.textContent = name;
      detailPrice.textContent = formatPrice(price);
      detailBody.innerHTML = `
        <dl class="detail-list">
          <div class="detail-row">
            <dt>分类</dt>
            <dd>${escapeHtml(category)}</dd>
          </div>
          <div class="detail-row">
            <dt>交易地点</dt>
            <dd>${escapeHtml(location)}</dd>
          </div>
          <div class="detail-row">
            <dt>卖家</dt>
            <dd>${escapeHtml(seller)}</dd>
          </div>
        </dl>
      `;
      contactSellerButton.disabled = false;
    }

    function renderDetailError() {
      detailCategory.textContent = "商品详情";
      detailTitle.textContent = "加载失败";
      detailPrice.textContent = "";
      detailBody.innerHTML = '<p class="modal-error">商品详情加载失败，请确认后端已启动</p>';
      contactSellerButton.disabled = true;
      openModal();
    }

    function productCategory(product) {
      return field(product, ["category", "type"], "其他");
    }

    function productSearchText(product) {
      return [
        field(product, ["title", "name", "productName"], ""),
        productCategory(product),
        field(product, ["location", "place", "campus", "address"], ""),
        field(product, ["seller", "sellerName", "user", "username", "owner"], "")
      ].join(" ").toLowerCase();
    }

    function filteredProducts() {
      const keyword = searchKeyword.trim().toLowerCase();

      return allProducts.filter((product) => {
        const matchesCategory = activeCategory === "全部" || productCategory(product) === activeCategory;
        const matchesSearch = !keyword || productSearchText(product).includes(keyword);
        return matchesCategory && matchesSearch;
      });
    }

    function renderFilteredProducts() {
      renderProducts(filteredProducts(), Boolean(searchKeyword.trim()));
    }

    function renderProducts(products, hasSearch) {
      if (!products.length) {
        grid.innerHTML = `<div class="message">${hasSearch ? "没有找到相关闲置物品" : "暂无商品，稍后再来看看。"}</div>`;
        statusText.textContent = "0 件商品";
        return;
      }

      grid.innerHTML = products.map((product) => {
        const id = productId(product);
        const name = field(product, ["name", "title", "productName"], "未命名商品");
        const price = field(product, ["price", "amount"], "面议");
        const category = productCategory(product);
        const location = field(product, ["location", "place", "campus", "address"], "校内");
        const seller = field(product, ["seller", "sellerName", "user", "username", "owner"], "匿名同学");

        return `
          <article class="card" data-product-id="${escapeHtml(id)}" role="button" tabindex="0" aria-label="查看${escapeHtml(name)}详情">
            <span class="category">${escapeHtml(category)}</span>
            <h3 class="name">${escapeHtml(name)}</h3>
            <p class="price">${escapeHtml(formatPrice(price))}</p>
            <dl class="meta">
              <div>
                <span>地点</span>
                <span>${escapeHtml(location)}</span>
              </div>
              <div>
                <span>卖家</span>
                <span>${escapeHtml(seller)}</span>
              </div>
            </dl>
            <div class="card-actions">
              <button class="delete-button" type="button" data-delete-id="${escapeHtml(id)}" aria-label="删除${escapeHtml(name)}">删除</button>
            </div>
          </article>
        `;
      }).join("");

      statusText.textContent = `${products.length} 件商品`;
    }

    categoryTabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        activeCategory = tab.dataset.category || "全部";
        categoryTabs.forEach((item) => {
          item.classList.toggle("active", item === tab);
        });
        renderFilteredProducts();
      });
    });

    searchBox.addEventListener("input", () => {
      searchKeyword = searchBox.value;
      renderFilteredProducts();
    });

    async function loadProductDetail(id) {
      if (!id) {
        renderDetailError();
        return;
      }

      setLoadingDetail();

      try {
        const response = await fetch(`${API_URL}/${encodeURIComponent(id)}`);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const payload = await response.json();
        renderDetail(normalizeProductDetail(payload));
      } catch (error) {
        renderDetailError();
      }
    }

    async function deleteProduct(id, button) {
      if (!id) {
        alert("删除失败，请确认后端已启动");
        return;
      }

      const confirmed = confirm("确定删除这个商品吗？");
      if (!confirmed) return;

      if (button) button.disabled = true;

      try {
        const response = await fetch(`${API_URL}/${encodeURIComponent(id)}`, {
          method: "DELETE"
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        await loadProducts();
      } catch (error) {
        alert("删除失败，请确认后端已启动");
        if (button) button.disabled = false;
      }
    }

    grid.addEventListener("click", (event) => {
      const deleteButton = event.target.closest(".delete-button");
      if (deleteButton) {
        event.stopPropagation();
        deleteProduct(deleteButton.dataset.deleteId, deleteButton);
        return;
      }

      const card = event.target.closest(".card");
      if (!card) return;
      loadProductDetail(card.dataset.productId);
    });

    grid.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") return;
      if (event.target.closest(".delete-button")) return;
      const card = event.target.closest(".card");
      if (!card) return;
      event.preventDefault();
      loadProductDetail(card.dataset.productId);
    });

    closeModalButton.addEventListener("click", closeModal);
    openPublishButton.addEventListener("click", openPublishModal);
    closePublishButton.addEventListener("click", closePublishModal);

    detailModal.addEventListener("click", (event) => {
      if (event.target === detailModal) closeModal();
    });

    publishModal.addEventListener("click", (event) => {
      if (event.target === publishModal) closePublishModal();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && detailModal.classList.contains("open")) {
        closeModal();
      }
      if (event.key === "Escape" && publishModal.classList.contains("open")) {
        closePublishModal();
      }
    });

    publishForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const formData = new FormData(publishForm);
      const title = String(formData.get("title") || "").trim();
      const priceText = String(formData.get("price") || "").trim();
      const category = String(formData.get("category") || "").trim();
      const location = String(formData.get("location") || "").trim();
      const seller = String(formData.get("seller") || "").trim();

      if (!title || !priceText || !category || !location || !seller) {
        publishTip.textContent = "请填写完整商品信息";
        return;
      }

      submitPublishButton.disabled = true;
      publishTip.textContent = "";

      try {
        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            title,
            price: Number(priceText),
            category,
            location,
            seller
          })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        publishForm.reset();
        closePublishModal();
        resetFilters();
        await loadProducts();
      } catch (error) {
        publishTip.textContent = "发布失败，请确认后端已启动";
      } finally {
        submitPublishButton.disabled = false;
      }
    });

    async function loadProducts() {
      try {
        const response = await fetch(API_URL);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const payload = await response.json();
        allProducts = normalizeProducts(payload);
        renderFilteredProducts();
      } catch (error) {
        statusText.textContent = "加载失败";
        grid.innerHTML = '<div class="message">后端服务未启动，请先运行 localhost:3001</div>';
      }
    }

    loadProducts();
  </script>
</body>
</html>
